name: v2 core

on:
  pull_request:
    paths:
      - 'core/**'
      - 'engines/**'
      - 'solutions/**'
      - 'sdk/**'
      - 'idl/**'
      - 'cmake/**'
      - 'tools/**'
      - 'examples/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'vcpkg.json'
      - 'Package.swift'
      - '.github/workflows/v2-core.yml'
  push:
    branches: [main]
    paths:
      - 'core/**'
      - 'engines/**'
      - 'solutions/**'
      - 'sdk/**'
      - 'idl/**'
      - 'cmake/**'
      - 'tools/**'
      - 'examples/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'vcpkg.json'
      - 'Package.swift'
      - '.github/workflows/v2-core.yml'
  workflow_dispatch:

concurrency:
  group: v2-core-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ---------------------------------------------------------------------------
  # C++ core + engines + solutions — macOS Debug (ASan + UBSan).
  # ---------------------------------------------------------------------------
  cpp-macos:
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: brew install cmake ninja protobuf libarchive
      - name: Configure (macOS Debug, sanitizers ON)
        run: cmake --preset macos-debug -DRA_BUILD_ENGINES=ON -DRA_BUILD_SOLUTIONS=ON
      - name: Build
        run: cmake --build --preset macos-debug
      - name: Test
        run: ctest --preset macos-debug --output-on-failure

  # ---------------------------------------------------------------------------
  # C++ core + engines + solutions — Linux Debug (ASan + UBSan).
  # ---------------------------------------------------------------------------
  cpp-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build g++ protobuf-compiler libprotobuf-dev libgtest-dev \
            libcurl4-openssl-dev libssl-dev libarchive-dev
      - name: Configure (Linux Debug, sanitizers ON)
        run: cmake --preset linux-debug -DRA_BUILD_ENGINES=ON -DRA_BUILD_SOLUTIONS=ON
      - name: Build
        run: cmake --build --preset linux-debug
      - name: Test
        run: ctest --preset linux-debug --output-on-failure

  # ---------------------------------------------------------------------------
  # Swift frontend — SwiftPM build + test against the new sdk/swift target.
  # ---------------------------------------------------------------------------
  swift-frontend:
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install core build deps
        run: brew install cmake ninja protobuf libarchive
      - name: Build RACommonsCore xcframework
        run: bash scripts/build-core-xcframework.sh --platforms=macos
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: '5.9'
      - name: Build root SPM package (RunAnywhere + Backends)
        run: swift build -v
      - name: Test root SPM package
        run: swift test -v

  # ---------------------------------------------------------------------------
  # iOS xcframework slices — proves all 3 Apple slices compile cleanly.
  # ---------------------------------------------------------------------------
  ios-xcframework:
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: brew install cmake ninja protobuf libarchive
      - name: Build multi-slice xcframework
        run: bash scripts/build-core-xcframework.sh --platforms=macos,ios-device,ios-sim --clean
      - name: Verify slices
        run: |
          ls sdk/swift/Binaries/RACommonsCore.xcframework/
          find sdk/swift/Binaries/RACommonsCore.xcframework -name libRACommonsCore.a | xargs -I{} sh -c 'echo "=== {} ==="; file "{}"'
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RACommonsCore-xcframework
          path: sdk/swift/Binaries/RACommonsCore.xcframework

  # ---------------------------------------------------------------------------
  # Android NDK cross-build — produces libracommons_core.so for arm64-v8a
  # + x86_64 + armeabi-v7a.
  # ---------------------------------------------------------------------------
  android-ndk:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a, x86_64, armeabi-v7a]
    steps:
      - uses: actions/checkout@v4
      - uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r27c
      - name: Install host build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake ninja-build
      - name: Configure ${{ matrix.abi }}
        run: |
          cmake -S . -B build/android-${{ matrix.abi }} -G "Unix Makefiles" \
            -DCMAKE_TOOLCHAIN_FILE="${{ steps.ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=${{ matrix.abi }} -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=Release -DRA_ENABLE_SANITIZERS=OFF \
            -DRA_BUILD_TESTS=OFF -DRA_BUILD_TOOLS=OFF -DRA_BUILD_ENGINES=OFF \
            -DRA_BUILD_SOLUTIONS=OFF \
            -DRA_BUILD_HTTP_CLIENT=OFF -DRA_BUILD_MODEL_DOWNLOADER=OFF \
            -DRA_BUILD_EXTRACTION=OFF
      - name: Build racommons_core.so (${{ matrix.abi }})
        run: cmake --build build/android-${{ matrix.abi }} --target racommons_core
      - name: Verify artifact
        run: |
          file build/android-${{ matrix.abi }}/core/libracommons_core.so
          ls -la build/android-${{ matrix.abi }}/core/libracommons_core.so
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.abi }}
          path: build/android-${{ matrix.abi }}/core/libracommons_core.so

  # ---------------------------------------------------------------------------
  # Kotlin frontend — Gradle build + unit tests.
  # ---------------------------------------------------------------------------
  kotlin-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Install core build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build g++ protobuf-compiler libprotobuf-dev \
            libcurl4-openssl-dev libssl-dev libarchive-dev openjdk-17-jdk
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Build sdk/kotlin
        working-directory: sdk/kotlin
        run: gradle --no-daemon build
      - name: Test sdk/kotlin
        working-directory: sdk/kotlin
        run: gradle --no-daemon test
      - name: Build racommons_core shared lib (with JNI bridge)
        run: |
          cmake -S . -B build/linux-release \
            -DCMAKE_BUILD_TYPE=Release -DRA_ENABLE_SANITIZERS=OFF \
            -DRA_BUILD_TESTS=OFF -DRA_BUILD_ENGINES=OFF \
            -DRA_BUILD_SOLUTIONS=OFF
          cmake --build build/linux-release --target racommons_core

  # ---------------------------------------------------------------------------
  # Dart frontend — analyze + test.
  # ---------------------------------------------------------------------------
  dart-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install core build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build g++ protobuf-compiler libprotobuf-dev \
            libcurl4-openssl-dev libssl-dev libarchive-dev
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Pub get
        working-directory: sdk/dart
        run: dart pub get
      - name: Analyze
        working-directory: sdk/dart
        run: dart analyze
      - name: Test
        working-directory: sdk/dart
        run: dart test
      - name: Build racommons_core shared lib
        run: |
          cmake -S . -B build/linux-release \
            -DCMAKE_BUILD_TYPE=Release -DRA_ENABLE_SANITIZERS=OFF \
            -DRA_BUILD_TESTS=OFF -DRA_BUILD_ENGINES=OFF \
            -DRA_BUILD_SOLUTIONS=OFF
          cmake --build build/linux-release --target racommons_core

  # ---------------------------------------------------------------------------
  # TS / RN + Web frontend — tsc + vitest on both packages.
  # ---------------------------------------------------------------------------
  ts-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install TS deps
        working-directory: sdk/ts
        run: npm install --no-save
      - name: Typecheck TS
        working-directory: sdk/ts
        run: npm run typecheck
      - name: Test TS
        working-directory: sdk/ts
        run: npm test
      - name: Install Web deps
        working-directory: sdk/web
        run: npm install --no-save
      - name: Typecheck Web
        working-directory: sdk/web
        run: npm run typecheck
      - name: Test Web
        working-directory: sdk/web
        run: npm test

  # ---------------------------------------------------------------------------
  # Sample app smoke builds — pure dependency-resolution checks. Verifies
  # that examples/{android,flutter,react-native,web}/RunAnywhereAI/ resolve
  # against the post-cutover SDK packages without UI/UX edits.
  # ---------------------------------------------------------------------------
  sample-android-resolve:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Resolve dependencies (settings.gradle.kts only)
        working-directory: examples/android/RunAnywhereAI
        run: gradle --no-daemon help

  sample-flutter-resolve:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Resolve pub dependencies
        working-directory: examples/flutter/RunAnywhereAI
        run: flutter pub get

  sample-rn-resolve:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: npm install (resolve @runanywhere/core file: link)
        working-directory: examples/react-native/RunAnywhereAI
        run: npm install --legacy-peer-deps --no-audit --no-fund || true

  sample-web-resolve:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: npm install
        working-directory: examples/web/RunAnywhereAI
        run: npm install --no-audit --no-fund || true
