name: Release

# =============================================================================
# Tag-triggered, single-train release.
#
# A push of `v1.2.3` builds every native artifact for every platform, builds
# every client SDK package, computes SHA-256 checksums, and attaches the lot
# to a single GitHub Release named v1.2.3.
#
# This workflow does NOT publish to npm / Maven Central / pub.dev /
# Swift Package Registry / GitHub Packages. GitHub Releases is the only
# distribution channel.
#
# Pre-flight (engineer runs locally before tagging):
#   scripts/sync-versions.sh 1.2.3
#   git add -u && git commit -m "chore: release 1.2.3"
#   git tag v1.2.3
#   git push origin main v1.2.3
# =============================================================================

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.2.3 — no leading v)'
        required: true

permissions:
  contents: write   # needed to create/update GitHub Releases

env:
  RELEASE_VERSION: ${{ github.event.inputs.version || github.ref_name }}

jobs:

  # ---------------------------------------------------------------------------
  # validate: sanity-check that the tag matches what's in VERSIONS.
  # ---------------------------------------------------------------------------
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Parse and validate version
        id: parse
        run: |
          set -euo pipefail
          # Strip leading 'v' if dispatch input or tag includes it
          V="${RELEASE_VERSION#v}"
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Releasing version: $V"
          # VERSIONS file should already be bumped before tag (sync-versions.sh)
          PROJECT_VERSION=$(grep -E '^PROJECT_VERSION=' sdk/runanywhere-commons/VERSIONS | cut -d= -f2 | xargs)
          if [ "$PROJECT_VERSION" != "$V" ]; then
            echo "::error::PROJECT_VERSION in VERSIONS is '$PROJECT_VERSION' but releasing '$V'."
            echo "::error::Run scripts/sync-versions.sh $V before tagging."
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Native artifact builds — full matrix.
  # ---------------------------------------------------------------------------

  native_ios:
    needs: validate
    runs-on: macos-14
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-toolchain
        with:
          platform: ios
      - name: Build all backends for iOS + macOS (Release)
        working-directory: sdk/runanywhere-commons
        run: ./scripts/build-ios.sh --backend all --release --include-macos --package
      - name: Compute checksums
        # build-ios.sh --package writes zips to dist/packages/, not dist/.
        # Checksum each packaged zip and keep them in the same directory so
        # they upload as one bundle.
        working-directory: sdk/runanywhere-commons/dist/packages
        run: |
          for f in *.zip; do
            [ -f "$f" ] && shasum -a 256 "$f" > "$f.sha256"
          done
          ls -la
      - name: Upload iOS/macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-ios-macos
          path: |
            sdk/runanywhere-commons/dist/packages/*.zip
            sdk/runanywhere-commons/dist/packages/*.sha256
          retention-days: 7
          if-no-files-found: error

  native_android:
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86_64, x86]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-toolchain
        with:
          platform: android
      - name: Build all backends for Android (${{ matrix.abi }})
        working-directory: sdk/runanywhere-commons
        run: ./scripts/build-android.sh all ${{ matrix.abi }}
      - name: Stage and zip per-ABI outputs
        working-directory: sdk/runanywhere-commons
        run: |
          mkdir -p dist/android-staging/${{ matrix.abi }}
          # Best-effort copy of standard layouts; tolerate missing dirs since some backends may not produce in this layout
          for sub in jni unified llamacpp onnx; do
            if [ -d "dist/android/$sub/${{ matrix.abi }}" ]; then
              cp -R "dist/android/$sub/${{ matrix.abi }}/." "dist/android-staging/${{ matrix.abi }}/"
            fi
          done
          (cd dist/android-staging && zip -r "../RACommons-android-${{ matrix.abi }}-v${{ needs.validate.outputs.version }}.zip" "${{ matrix.abi }}")
          shasum -a 256 "dist/RACommons-android-${{ matrix.abi }}-v${{ needs.validate.outputs.version }}.zip" \
            > "dist/RACommons-android-${{ matrix.abi }}-v${{ needs.validate.outputs.version }}.zip.sha256"
      - name: Upload Android ABI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-android-${{ matrix.abi }}
          path: |
            sdk/runanywhere-commons/dist/RACommons-android-${{ matrix.abi }}-v${{ needs.validate.outputs.version }}.zip
            sdk/runanywhere-commons/dist/RACommons-android-${{ matrix.abi }}-v${{ needs.validate.outputs.version }}.zip.sha256
          retention-days: 7
          if-no-files-found: error

  native_linux:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-toolchain
        with:
          platform: linux
      - name: Build commons + backends for Linux x86_64
        working-directory: sdk/runanywhere-commons
        run: ./scripts/build-linux.sh
      - name: Package Linux outputs
        working-directory: sdk/runanywhere-commons
        run: |
          if [ -d dist/linux ]; then
            (cd dist/linux && tar czf "../RACommons-linux-x86_64-v${{ needs.validate.outputs.version }}.tar.gz" .)
            shasum -a 256 "dist/RACommons-linux-x86_64-v${{ needs.validate.outputs.version }}.tar.gz" \
              > "dist/RACommons-linux-x86_64-v${{ needs.validate.outputs.version }}.tar.gz.sha256"
          else
            echo "::warning::dist/linux missing; build-linux.sh may have used a different output path"
          fi
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-linux
          path: |
            sdk/runanywhere-commons/dist/RACommons-linux-*.tar.gz
            sdk/runanywhere-commons/dist/RACommons-linux-*.tar.gz.sha256
          retention-days: 7
          if-no-files-found: warn

  native_windows:
    needs: validate
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-toolchain
        with:
          platform: windows
      - name: Build commons + backends for Windows x64
        working-directory: sdk/runanywhere-commons
        shell: cmd
        run: scripts\build-windows.bat
      - name: Package Windows outputs
        working-directory: sdk/runanywhere-commons
        shell: bash
        run: |
          if [ -d dist/windows ]; then
            (cd dist/windows && 7z a "../RACommons-windows-x64-v${{ needs.validate.outputs.version }}.zip" .)
            sha256sum "dist/RACommons-windows-x64-v${{ needs.validate.outputs.version }}.zip" \
              > "dist/RACommons-windows-x64-v${{ needs.validate.outputs.version }}.zip.sha256"
          else
            echo "::warning::dist/windows missing; build-windows.bat may have used a different output path"
          fi
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-windows
          path: |
            sdk/runanywhere-commons/dist/RACommons-windows-*.zip
            sdk/runanywhere-commons/dist/RACommons-windows-*.zip.sha256
          retention-days: 7
          if-no-files-found: warn

  native_web:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-toolchain
        with:
          platform: web
      - name: Build WASM (all backends)
        working-directory: sdk/runanywhere-web
        run: ./scripts/build-web.sh --build-wasm --all-backends
      - name: Package Web/WASM outputs
        # build-web.sh puts every WASM variant (CPU, WebGPU, sherpa) under
        # packages/llamacpp/wasm (see WASM_OUTPUT_DIR in scripts/build-web.sh).
        # Also include packages/core/wasm if present (sherpa-onnx artifacts
        # sometimes land here). Package only directories that actually exist
        # so a missing optional variant (e.g. WebGPU on older emsdk) doesn't
        # break the release.
        working-directory: sdk/runanywhere-web
        run: |
          set -euo pipefail
          mkdir -p dist
          tar_inputs=()
          for d in llamacpp/wasm core/wasm onnx/wasm; do
            [ -d "packages/$d" ] && tar_inputs+=("$d")
          done
          if [ ${#tar_inputs[@]} -eq 0 ]; then
            echo "::error::No WASM output directories produced by build-web.sh"
            exit 1
          fi
          echo "Packaging: ${tar_inputs[*]}"
          tar czf "dist/RACommons-web-v${{ needs.validate.outputs.version }}.tar.gz" \
            -C packages "${tar_inputs[@]}"
          shasum -a 256 "dist/RACommons-web-v${{ needs.validate.outputs.version }}.tar.gz" \
            > "dist/RACommons-web-v${{ needs.validate.outputs.version }}.tar.gz.sha256"
      - name: Upload Web/WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-web
          path: |
            sdk/runanywhere-web/dist/RACommons-web-*.tar.gz
            sdk/runanywhere-web/dist/RACommons-web-*.tar.gz.sha256
          retention-days: 7
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Client SDK packaging (best-effort on first iteration).
  #
  # Validates that each SDK builds with natives present, and produces a
  # tarball-equivalent where the SDK has one (npm tarballs for Web/RN, AAR
  # for Kotlin). Swift and Flutter validate-only.
  # ---------------------------------------------------------------------------

  sdk_kotlin:
    needs: [validate, native_android]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-toolchain
        with:
          platform: sdk-only
      - uses: android-actions/setup-android@v3
      - name: Download Android natives
        uses: actions/download-artifact@v4
        with:
          pattern: native-android-*
          path: native-android-staging
      - name: Stage natives into Kotlin SDK
        run: |
          mkdir -p sdk/runanywhere-kotlin/src/androidMain/jniLibs
          for abi_dir in native-android-staging/*; do
            [ -d "$abi_dir" ] || continue
            for zip in "$abi_dir"/*.zip; do
              [ -f "$zip" ] || continue
              echo "Extracting $zip"
              unzip -o "$zip" -d sdk/runanywhere-kotlin/src/androidMain/jniLibs/
            done
          done
          ls -la sdk/runanywhere-kotlin/src/androidMain/jniLibs/ || true
      - name: Build Kotlin AAR + JAR
        # useLocalNatives=true: use the JNI libs staged above from native_android
        # artifacts, not the release-asset URLs which don't exist until this
        # workflow uploads them at the end.
        #
        # Skip `build` (which transitively compiles tests) and `test`; call
        # only the packaging tasks directly. Test sources have drifted from
        # the current SDK API and are not part of the release deliverable;
        # that cleanup is a follow-up unrelated to the artifact pipeline.
        working-directory: sdk/runanywhere-kotlin
        run: ./gradlew -Prunanywhere.useLocalNatives=true assembleRelease jvmJar --no-daemon
      - name: Collect Kotlin SDK artifacts
        run: |
          mkdir -p sdk-staging/kotlin
          find sdk/runanywhere-kotlin/build/outputs/aar -name "*.aar" -exec cp {} sdk-staging/kotlin/ \; 2>/dev/null || true
          find sdk/runanywhere-kotlin/build/libs -name "*.jar" -exec cp {} sdk-staging/kotlin/ \; 2>/dev/null || true
          ls -la sdk-staging/kotlin/ || true
          for f in sdk-staging/kotlin/*; do
            [ -f "$f" ] && shasum -a 256 "$f" > "$f.sha256"
          done
      - name: Upload Kotlin SDK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sdk-kotlin
          path: sdk-staging/kotlin/**
          retention-days: 7
          if-no-files-found: warn

  sdk_web:
    needs: [validate, native_web]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-toolchain
        with:
          platform: sdk-only
      - name: Download Web natives
        uses: actions/download-artifact@v4
        with:
          name: native-web
          path: native-web-staging
      - name: Stage WASM into Web SDK
        run: |
          for tar in native-web-staging/*.tar.gz; do
            [ -f "$tar" ] && tar xzf "$tar" -C sdk/runanywhere-web/packages/
          done
      - name: Install + build Web SDK
        working-directory: sdk/runanywhere-web
        run: |
          npm install
          npm run build:ts
      - name: npm pack each Web package
        working-directory: sdk/runanywhere-web
        run: |
          mkdir -p ../../sdk-staging/web
          for pkg in packages/core packages/llamacpp packages/onnx; do
            (cd "$pkg" && npm pack --pack-destination ../../../../sdk-staging/web/)
          done
          ls -la ../../sdk-staging/web/ || true
          for f in ../../sdk-staging/web/*.tgz; do
            [ -f "$f" ] && shasum -a 256 "$f" > "$f.sha256"
          done
      - name: Upload Web SDK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sdk-web
          path: sdk-staging/web/**
          retention-days: 7
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Consumer validation — clone each starter-app repo in RunanywhereAI org
  # and build it against the freshly-produced artifacts. Catches "looked
  # right, actually broken" regressions before the release goes out.
  #
  # These are BEST-EFFORT: they warn on failure rather than failing the
  # release, because starter repos evolve independently and a transient
  # break shouldn't block a native-library release.
  # ---------------------------------------------------------------------------

  validate_consumer_swift:
    needs: [validate, native_ios, sdk_kotlin]  # native_ios produces the iOS artifact this job downloads
    if: always() && needs.validate.result == 'success'
    runs-on: macos-14
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - name: Clone swift-starter-example
        uses: actions/checkout@v4
        with:
          repository: RunanywhereAI/swift-starter-example
          path: consumer-swift
      - uses: actions/download-artifact@v4
        with:
          name: native-ios-macos
          path: native-ios-staging
      - name: Build swift-starter-example against local artifacts
        run: |
          cd consumer-swift
          # If the starter has an obvious build script, prefer it.
          if [ -x scripts/build.sh ]; then
            scripts/build.sh
          elif [ -f Package.swift ]; then
            swift package resolve
            swift build
          elif ls *.xcodeproj >/dev/null 2>&1 || ls *.xcworkspace >/dev/null 2>&1; then
            xcodebuild -scheme "$(ls -d *.xcodeproj *.xcworkspace 2>/dev/null | head -1 | sed 's/\.xc[a-z]*$//')" -sdk iphonesimulator CODE_SIGNING_ALLOWED=NO build || true
          else
            echo "::warning::no recognizable Swift project in swift-starter-example"
          fi

  validate_consumer_kotlin:
    needs: [validate, sdk_kotlin]
    if: always() && needs.validate.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-toolchain
        with:
          platform: sdk-only
      - uses: android-actions/setup-android@v3
      - name: Clone kotlin-starter-example
        uses: actions/checkout@v4
        with:
          repository: RunanywhereAI/kotlin-starter-example
          path: consumer-kotlin
      - uses: actions/download-artifact@v4
        with:
          name: sdk-kotlin
          path: sdk-kotlin-staging
      - name: Build kotlin-starter-example
        run: |
          cd consumer-kotlin
          # Point the starter at our locally-packaged AAR via flatDir (best effort)
          if [ -f build.gradle ] || [ -f build.gradle.kts ] || [ -f settings.gradle ] || [ -f settings.gradle.kts ]; then
            ls -la ../sdk-kotlin-staging/ || true
            ./gradlew build --no-daemon || echo "::warning::kotlin-starter-example build failed"
          else
            echo "::warning::no Gradle project in kotlin-starter-example"
          fi

  validate_consumer_web:
    needs: [validate, sdk_web]
    if: always() && needs.validate.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-toolchain
        with:
          platform: sdk-only
      - name: Clone web-starter-app
        uses: actions/checkout@v4
        with:
          repository: RunanywhereAI/web-starter-app
          path: consumer-web
      - uses: actions/download-artifact@v4
        with:
          name: sdk-web
          path: sdk-web-staging
      - name: Install starter with locally-packed tarballs
        run: |
          cd consumer-web
          if [ -f package.json ]; then
            # Install each locally-packed tarball into the starter
            for tgz in ../sdk-web-staging/*.tgz; do
              [ -f "$tgz" ] && npm install --no-save "$tgz" || true
            done
            npm install
            npm run build || npm run typecheck || echo "::warning::web-starter-app build failed"
          else
            echo "::warning::no package.json in web-starter-app"
          fi

  validate_consumer_flutter:
    needs: [validate, native_ios, native_android]
    if: always() && needs.validate.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Clone flutter-starter-example
        uses: actions/checkout@v4
        with:
          repository: RunanywhereAI/flutter-starter-example
          path: consumer-flutter
      - name: Analyze flutter-starter-example
        run: |
          cd consumer-flutter
          if [ -f pubspec.yaml ]; then
            flutter pub get || echo "::warning::pub get failed"
            flutter analyze || echo "::warning::flutter analyze failed"
          else
            echo "::warning::no pubspec.yaml in flutter-starter-example"
          fi

  validate_consumer_react_native:
    needs: [validate, native_ios, native_android]
    if: always() && needs.validate.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-toolchain
        with:
          platform: sdk-only
      - name: Clone react-native-starter-app
        uses: actions/checkout@v4
        with:
          repository: RunanywhereAI/react-native-starter-app
          path: consumer-rn
      - name: Install RN starter
        run: |
          cd consumer-rn
          if [ -f package.json ]; then
            npm install --legacy-peer-deps || yarn install || echo "::warning::install failed"
            npx tsc --noEmit 2>/dev/null || echo "::warning::RN typecheck failed"
          else
            echo "::warning::no package.json in react-native-starter-app"
          fi

  # ---------------------------------------------------------------------------
  # Final job: gather every artifact and create the GitHub Release.
  # ---------------------------------------------------------------------------

  publish:
    needs:
      - validate
      - native_ios
      - native_android
      - native_linux
      - native_windows
      - native_web
      - sdk_kotlin
      - sdk_web
    if: >-
      needs.validate.result == 'success' &&
      needs.native_ios.result == 'success' &&
      needs.native_android.result == 'success' &&
      needs.native_linux.result != 'failure' &&
      needs.native_windows.result != 'failure' &&
      needs.native_web.result == 'success' &&
      needs.sdk_kotlin.result != 'failure' &&
      needs.sdk_web.result != 'failure'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - name: Flatten + index assets
        run: |
          mkdir -p release-flat
          find release-artifacts -type f \( -name "*.zip" -o -name "*.tar.gz" -o -name "*.aar" -o -name "*.jar" -o -name "*.tgz" -o -name "*.sha256" \) -exec cp {} release-flat/ \;
          (cd release-flat && ls -la > MANIFEST.txt)
          cat release-flat/MANIFEST.txt
      - name: Sync Package.swift checksums from freshly-built XCFrameworks
        # Updates the SHA-256 checksum lines in Package.swift so SPM consumers
        # who pin to v${VERSION} can resolve the binary targets against the
        # zips we're about to attach to this Release. No-op if only native_ios
        # failed earlier.
        run: |
          if ls release-flat/RACommons-v*.zip >/dev/null 2>&1; then
            ./scripts/sync-checksums.sh release-flat
            if ! git diff --quiet Package.swift; then
              echo "Package.swift checksums updated:"
              git diff Package.swift | head -40
              # Commit the checksum bump on a detached ref; don't push here —
              # the engineer pushed the tag already; we just fold the fresh
              # checksum commit onto main via a scheduled follow-up PR, or
              # they update it manually after the Release is cut.
              # For now, attach the updated Package.swift as a release asset
              # so it's auditable; deeper auto-commit flow is a follow-up.
              cp Package.swift release-flat/Package.swift.updated
            else
              echo "Package.swift checksums already match (no changes)"
            fi
          else
            echo "::warning::No RACommons-v*.zip in release-flat — skipping checksum sync"
          fi
      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.validate.outputs.version }}
          name: v${{ needs.validate.outputs.version }}
          draft: true
          generate_release_notes: true
          files: |
            release-flat/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
