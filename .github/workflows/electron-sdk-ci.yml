# CI for @runanywhere/electron. The unit suite is hermetic (pure TS/JS — no native
# addon, no models), so it builds and runs anywhere. The native addon + the
# integration suite need MSVC + the compiled commons/engines and run separately.
name: electron-sdk-ci

on:
  push:
    paths:
      - 'sdk/runanywhere-electron/**'
      - 'examples/electron/**'
      - '.github/workflows/electron-sdk-ci.yml'
  pull_request:
    paths:
      - 'sdk/runanywhere-electron/**'
      - 'examples/electron/**'
      - '.github/workflows/electron-sdk-ci.yml'

# Least-privilege: this workflow only needs to read the repo contents.
permissions:
  contents: read

jobs:
  unit:
    # The unit tests are platform-agnostic, but the package declares `os: win32`
    # (it ships a prebuilt Windows native addon), so `npm install` only succeeds
    # on a Windows runner.
    runs-on: windows-latest
    defaults:
      run:
        working-directory: sdk/runanywhere-electron
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # 22+ so `node --test` expands the "test/unit/**/*.test.js" glob
          # (glob support landed in Node 21; Node 20 treats it as a literal path).
          node-version: '22'
      - name: Install dependencies
        run: npm install
      - name: Type-check + build
        run: npm run build
      - name: Unit tests
        run: npm test
