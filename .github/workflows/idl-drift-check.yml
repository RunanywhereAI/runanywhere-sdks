name: IDL drift check

# Runs on every PR and every push to `main`. If any .proto under idl/ is edited
# without regenerating the committed language bindings, or if anyone hand-edits
# a generated file, this job fails with ::error::IDL-generated code is out of
# sync with .proto sources. Fixing the PR is a one-liner locally:
#
#   ./idl/codegen/generate_all.sh && (cd sdk/shared/proto-ts && npm install --package-lock=false && npm run build) && git add -A && git commit --amend --no-edit

on:
  pull_request:
    paths:
      - 'idl/**'
      - 'sdk/runanywhere-swift/Sources/RunAnywhere/Generated/**'
      - 'sdk/runanywhere-kotlin/src/main/kotlin/com/runanywhere/sdk/generated/**'
      - 'sdk/runanywhere-flutter/packages/runanywhere/lib/generated/**'
      - 'sdk/shared/proto-ts/**'
      - 'sdk/runanywhere-commons/src/generated/proto/**'
      - 'scripts/setup-toolchain.sh'
      - '.github/workflows/idl-drift-check.yml'
  push:
    # v2 close-out (B34): include long-lived integration branches so a
    # direct push that touches IDL-adjacent files without a PR still
    # gets the drift gate.
    branches: [main, feat/v2-architecture]
    paths:
      - 'idl/**'
      - 'sdk/runanywhere-swift/Sources/RunAnywhere/Generated/**'
      - 'sdk/runanywhere-kotlin/src/main/kotlin/com/runanywhere/sdk/generated/**'
      - 'sdk/runanywhere-flutter/packages/runanywhere/lib/generated/**'
      - 'sdk/shared/proto-ts/**'
      - 'sdk/runanywhere-commons/src/generated/proto/**'
      - 'scripts/setup-toolchain.sh'
      - '.github/workflows/idl-drift-check.yml'

permissions:
  contents: read

jobs:
  check:
    name: Verify generated code matches IDL
    # T1.7: macos-15 ships Xcode 16 with Swift 6, which is the minimum
    # required by Homebrew's grpc-swift v2 formula. On macos-14 the formula
    # bails with "protoc-gen-grpc-swift: An unsatisfied requirement failed
    # this build", which previously masked the Swift gRPC plugin install and
    # let downstream `protoc --grpc-swift_out=` discoveries silently fail.
    runs-on: macos-15
    # Mint cache-miss path (first run after Mintfile bump) rebuilds
    # SwiftLint + periphery + swift-format + swift-protobuf +
    # protoc-gen-grpc-swift from source, which on a cold runner takes
    # ~20 minutes on macos-15. Bump the timeout so the initial-warmup
    # run can complete; subsequent runs hit the actions/cache restore
    # path and finish in under 2 minutes.
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: Cache Homebrew
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/Homebrew
            /opt/homebrew
            ~/Library/Caches/Homebrew
          key: ${{ runner.os }}-brew-protoc-${{ hashFiles('scripts/setup-toolchain.sh') }}

      # T4.3: bootstrap the Mintfile so the Swift dev-tool versions pinned
      # at the repo root (SwiftLint / Periphery / swift-format /
      # swift-protobuf / grpc-swift) are the single source of truth across
      # every CI workflow. The brew steps below intentionally remain — this
      # repo currently relies on Homebrew's `protoc-gen-grpc-swift-2`
      # binary which is not produced by the Mintfile-pinned grpc-swift 1.x
      # checkout. Mint bootstrap is run with `--overwrite y` so a stale
      # cache cannot stall the job. Once `scripts/setup-toolchain.sh`
      # migrates to mint-only, the brew installs can drop out.
      - name: Cache Mint packages
        uses: actions/cache@v4
        with:
          path: ~/.mint
          key: ${{ runner.os }}-mint-${{ hashFiles('Mintfile') }}
          restore-keys: |
            ${{ runner.os }}-mint-

      - name: Install Mint and bootstrap Mintfile
        run: |
          brew install mint
          mint bootstrap --overwrite y
          # Smoke-check that the pinned versions resolved.
          mint run swiftlint version
          mint run swift-format --version

      - name: Install protoc + swift-protobuf (Homebrew)
        run: |
          brew install protobuf swift-protobuf

      - name: Install grpc-swift (v2 plugin → Swift AsyncStream gRPC stubs)
        run: |
          # T1.7: grpc-swift v2 requires Swift 6 / Xcode 16 (macos-15 runner).
          # Fail loud if the install does not produce protoc-gen-grpc-swift —
          # silently skipping previously let Swift gRPC drift through CI.
          #
          # v2 close-out Phase 3: grpc-swift formula installs the binary as
          # protoc-gen-grpc-swift-2; symlink to the legacy name the codegen
          # script expects so `protoc --grpc-swift_out=` invocations resolve.
          brew install grpc-swift
          if [ -x /opt/homebrew/bin/protoc-gen-grpc-swift-2 ]; then
            ln -sf /opt/homebrew/bin/protoc-gen-grpc-swift-2 /opt/homebrew/bin/protoc-gen-grpc-swift
          fi
          if ! command -v protoc-gen-grpc-swift >/dev/null 2>&1; then
            echo "::error::protoc-gen-grpc-swift not on PATH after brew install grpc-swift"
            exit 1
          fi

      - name: Install wire-compiler (best-effort — Gradle Wire plugin is the fallback)
        run: |
          brew install wire || echo "wire bottle unavailable; Gradle Wire plugin will handle Kotlin codegen"

      - name: Install Dart 3.x
        # T1.7: macos-{14,15} runners do not ship Dart by default, so the
        # previous `command -v dart` gate silently skipped the Dart codegen
        # and let Flutter bindings drift (e.g. tool_call additions to
        # LLMStreamEvent / LLMStreamFinalResult in idl/llm_service.proto were
        # not regenerated into lib/generated/llm_service.pb.dart). Pin Dart
        # 3.0+ here so generate_dart.sh always runs in CI.
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install Dart plugin (protoc-gen-dart)
        # Pinned to PROTOC_GEN_DART_VERSION in sdk/runanywhere-commons/VERSIONS
        # (single source of truth for IDL codegen toolchain). Bump there first
        # — this workflow mirrors that pin.
        run: |
          dart pub global activate protoc_plugin 25.0.0
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Install ts-proto (npm)
        # Pinned to TS_PROTO_VERSION in sdk/runanywhere-commons/VERSIONS
        # (single source of truth). Major-bumped to 2.x; generated TS still
        # parses under tsc 5.9 strict.
        run: |
          npm install -g ts-proto@2.11.8 protobufjs

      - name: Install Python protobuf + pyyaml runtime
        # idl/codegen/generate_*_convenience.py drivers import
        # `google.protobuf.descriptor_pb2` and the swift modality
        # ABI generator parses YAML schemas, so the system Python
        # needs both packages available before generate_all.sh runs.
        run: python3 -m pip install --upgrade --break-system-packages protobuf pyyaml

      - name: Dump toolchain versions (debug)
        run: |
          echo "protoc: $(protoc --version)"
          echo "protoc-gen-swift: $(protoc-gen-swift --version 2>/dev/null || echo 'not present')"
          echo "protoc-gen-grpc-swift: $(protoc-gen-grpc-swift --version 2>/dev/null || echo 'not present')"
          echo "wire-compiler: $(wire-compiler --version 2>/dev/null || echo 'not present')"
          echo "dart: $(dart --version 2>&1 || echo 'not present')"
          echo "node: $(node --version)"

      - name: Regenerate all bindings
        run: ./idl/codegen/generate_all.sh

      - name: Build shared TypeScript proto package
        run: |
          cd sdk/shared/proto-ts
          # `--workspaces=false` so npm doesn't walk up into the repo-root
          # Yarn workspace (which uses `workspace:*` deps that npm can't
          # parse — bails with EUNSUPPORTEDPROTOCOL).
          npm install --package-lock=false --workspaces=false
          npm run build

      - name: Fail on drift
        run: |
          if ! git diff --exit-code --stat; then
            echo "::error::IDL-generated code is out of sync with .proto sources."
            echo ""
            echo "To fix locally:"
            echo "  ./scripts/setup-toolchain.sh"
            echo "  ./idl/codegen/generate_all.sh"
            echo "  (cd sdk/shared/proto-ts && npm install --package-lock=false && npm run build)"
            echo "  git add -A && git commit -m 'chore(codegen): regenerate bindings'"
            exit 1
          fi
          echo "✓ No drift detected."
