name: PR build matrix

# GAP 07 Phase 7 rewrite — see v2_gap_specs/GAP_07_SINGLE_ROOT_CMAKE.md.
#
# This file replaces the previous 601-line workflow that called per-SDK
# build-*.sh scripts. After GAP 07 the canonical entry point is the root
# CMake + presets:
#
#   cmake --preset <preset>
#   cmake --build  --preset <preset>
#   ctest          --preset <preset>     # debug presets only
#
# The wrapper scripts under scripts/build-core-*.sh package the artifacts for
# each frontend SDK; per-SDK jobs that need those artifacts call the wrapper
# instead of duplicating cmake calls.

on:
  pull_request:
    branches: [main, dev, "feat/v2-architecture"]
  push:
    branches: [main, dev, "feat/v2-architecture"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =============================================================================
  # Native core builds (one job per CMake preset family)
  # =============================================================================

  macos-debug:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install ninja + protobuf
        run: brew install ninja protobuf
      - name: Configure
        run: cmake --preset macos-debug
      - name: Build
        run: cmake --build --preset macos-debug
      - name: Test
        run: ctest --preset macos-debug

  macos-release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - run: brew install ninja protobuf
      - run: cmake --preset macos-release
      - run: cmake --build --preset macos-release

  linux-debug:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install ninja + protobuf
        run: sudo apt-get update && sudo apt-get install -y ninja-build libprotobuf-dev protobuf-compiler
      - run: cmake --preset linux-debug
      - run: cmake --build --preset linux-debug
      - run: ctest --preset linux-debug

  linux-asan:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y ninja-build libprotobuf-dev protobuf-compiler
      - run: cmake --preset linux-asan
      - run: cmake --build --preset linux-asan
      - run: ctest --preset linux-asan

  ios-device:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - run: brew install protobuf
      - run: cmake --preset ios-device
      - run: cmake --build --preset ios-device --config Release

  android-arm64:
    runs-on: ubuntu-22.04
    env:
      # Stage the NDK outside the workspace so the unzip + extraction directory
      # do NOT collide with the destination path (which previously caused
      # `mv ... into a subdirectory of itself`).
      ANDROID_NDK_HOME: /tmp/android-ndk-r27c
    steps:
      - uses: actions/checkout@v4
      - name: Install Android NDK
        run: |
          curl -sSL -o /tmp/ndk.zip https://dl.google.com/android/repository/android-ndk-r27c-linux.zip
          unzip -q /tmp/ndk.zip -d /tmp
          test -d "${ANDROID_NDK_HOME}"
      - run: sudo apt-get update && sudo apt-get install -y ninja-build
      - run: cmake --preset android-arm64
      - run: cmake --build --preset android-arm64

  # =============================================================================
  # Per-SDK frontend builds (call wrapper scripts, which internally drive cmake)
  # =============================================================================

  swift-spm:
    runs-on: macos-14
    needs: [ios-device]
    steps:
      - uses: actions/checkout@v4
      - run: brew install protobuf
      - name: Build XCFramework
        run: ./scripts/build-core-xcframework.sh
      - name: swift build
        run: swift build --target RunAnywhere

  kotlin-android:
    runs-on: ubuntu-22.04
    needs: [android-arm64]
    env:
      ANDROID_NDK_HOME: /tmp/android-ndk-r27c
    steps:
      - uses: actions/checkout@v4
      - name: Install Android NDK
        run: |
          curl -sSL -o /tmp/ndk.zip https://dl.google.com/android/repository/android-ndk-r27c-linux.zip
          unzip -q /tmp/ndk.zip -d /tmp
          test -d "${ANDROID_NDK_HOME}"
      - run: sudo apt-get update && sudo apt-get install -y ninja-build
      - name: Build Android JNI libs
        run: ./scripts/build-core-android.sh
      - name: gradle assembleDebug
        run: ./gradlew :runanywhere-kotlin:assembleDebug

  flutter-pubget:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { flutter-version: '3.38.x' }
      - run: cd sdk/runanywhere-flutter/packages/runanywhere && flutter pub get && flutter analyze --no-fatal-infos lib

  rn-typecheck:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      # Repo root and sdk/runanywhere-react-native pin `packageManager: yarn@3.6.1`
      # (Yarn Berry). The runner's global yarn is 1.x and refuses to run, so we
      # activate the pinned version through Corepack before any `yarn` call.
      - name: Enable Corepack (yarn@3.6.1)
        run: |
          corepack enable
          corepack prepare yarn@3.6.1 --activate
      # Yarn 3 Berry: the project root with the workspaces declaration is the
      # REPO ROOT (which lists `sdk/runanywhere-react-native/packages/*` as
      # workspace members). `sdk/runanywhere-react-native` itself is NOT a
      # workspace member, so `cd sdk/runanywhere-react-native && yarn install`
      # fails the project-detection guard. Run yarn from the repo root and
      # target the specific workspace explicitly.
      - name: Yarn install (repo root)
        run: yarn install --immutable
      - name: Typecheck @runanywhere/core
        run: yarn workspace @runanywhere/core typecheck

  web-typecheck:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      # Install + typecheck from the workspace root so the in-tree
      # @runanywhere/proto-ts package (sdk/shared/proto-ts) is resolved as a
      # workspace member instead of being fetched from the npm registry. The
      # `typecheck` script builds proto-ts first, then typechecks core,
      # llamacpp, and onnx — exactly the surface this PR touches.
      # npm 10 (Node 20) does not consistently hoist transitive workspace deps
      # for proto-ts when installed only via the web root workspace install.
      # Install proto-ts deps explicitly first so `long` + `protobufjs/minimal`
      # are resolvable when `tsc --noEmit` runs against sdk/shared/proto-ts.
      - name: Install proto-ts dependencies (workspace member)
        working-directory: sdk/shared/proto-ts
        run: npm install --no-audit --no-fund
      - name: Install workspace dependencies
        working-directory: sdk/runanywhere-web
        run: npm install --no-audit --no-fund
      - name: Typecheck Web workspace (proto-ts + packages)
        working-directory: sdk/runanywhere-web
        run: npm run typecheck
