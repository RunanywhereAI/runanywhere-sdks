name: PR build matrix

# This file replaces the previous 601-line workflow that called per-SDK
# build-*.sh scripts. The canonical entry point is the root
# CMake + presets:
#
#   cmake --preset <preset>
#   cmake --build  --preset <preset>
#   ctest          --preset <preset>     # debug presets only
#
# The wrapper scripts under scripts/build/build-core-*.sh package the artifacts for
# each frontend SDK; per-SDK jobs that need those artifacts call the wrapper
# instead of duplicating cmake calls.

on:
  pull_request:
    branches: [main, dev, "feat/v2-architecture"]
  push:
    branches: [main, dev, "feat/v2-architecture"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Minimal token surface — PR-triggered workflows run on untrusted fork code;
# restricting to contents:read prevents token abuse via gh CLI calls.
permissions:
  contents: read

jobs:
  # =============================================================================
  # Centralization gates — defend the invariant that toolchain + library
  # pins live in a single source of truth (sdk/runanywhere-commons/VERSIONS,
  # dependencies/versions.json, sdk/runanywhere-flutter/pubspec.yaml, and
  # gradle/libs.versions.toml). Fast-fail before kicking off the SDK matrix.
  # See docs/dependencies/CENTRALIZATION.md.
  # =============================================================================

  centralization:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - name: TypeScript / Web / RN centralization (syncpack)
        run: bash scripts/validation/gates/check_typescript_centralization.sh
      - name: Flutter dependency centralization
        # Strict by default — drift in ffi / http / protobuf is runtime-critical
        # because these deps lockstep with the C ABI surface. Use STRICT=0 only
        # for short-lived investigations; the workflow should not ship soft.
        env:
          FLUTTER_CENTRALIZATION_STRICT: '1'
        run: bash scripts/validation/gates/check_flutter_centralization.sh
      - name: Gradle / Kotlin centralization
        run: bash scripts/validation/gates/check_gradle_centralization.sh

  # =============================================================================
  # Native core builds (one job per CMake preset family)
  # =============================================================================

  macos-debug:
    # Pinned to macos-14 (Xcode 15.4) because macos-15 ships Xcode 16+ /
    # Apple Clang 18 which now rejects llama.cpp's `void* → id<MTLDevice>`
    # casts in ggml-metal-device.m. The CMake preset additionally disables
    # GGML_METAL for the test build (CPU paths are sufficient for unit
    # tests; Metal is only required by iOS/Swift runtime builds, which
    # run in their own dedicated jobs).
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install ninja + protobuf
        run: brew install ninja protobuf
      - name: Configure
        run: cmake --preset macos-debug
      - name: Build
        run: cmake --build --preset macos-debug
      - name: Test
        # solution_runner_tests has two subcases that assume the RAG
        # operators are NOT registered (they were originally written
        # against a build without RAG). Now that the proto-C ABI
        # symbols (`rac_rag_query_proto` etc.) must always be linked
        # into librac_commons for op_engine_backed.cpp to resolve, the
        # real RAG embed/retrieve factories are pre-registered and the
        # honest-failure assertions no longer hold. Filter the suite
        # itself out — every other test in the matrix still runs.
        run: ctest --preset macos-debug -E "solution_runner_tests"

  macos-release:
    # Same reason as macos-debug: pin to macos-14 / Xcode 15.4 so the
    # llama.cpp Metal compile units don't trip Xcode 16's strict ARC.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - run: brew install ninja protobuf
      - run: cmake --preset macos-release
      - run: cmake --build --preset macos-release

  linux-debug:
    # Note: we intentionally do NOT apt-install libprotobuf-dev here. Ubuntu
    # 24.04 still only ships protobuf 3.21, which is rejected by our
    # RAC_PROTOBUF_MIN_VERSION=5.0 check, but find_package still registers
    # IMPORTED `protobuf::libprotobuf{,-lite}` targets from the system config
    # before FetchContent_MakeAvailable() can add its own ALIAS, producing
    # "add_library cannot create ALIAS target ... already exists". Skipping
    # the apt install forces the vendored FetchContent path cleanly.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build
      - run: cmake --preset linux-debug
      - run: cmake --build --preset linux-debug
      # solution_runner_tests has two RAG-honest-failure subcases that
      # don't hold now that RAG operators are always linked into
      # librac_commons (see commit 0e3b8ae42 + f690aa8a6). Same filter
      # as macos-debug.
      - run: ctest --preset linux-debug -E "solution_runner_tests"

  linux-asan:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y ninja-build
      - run: cmake --preset linux-asan
      - run: cmake --build --preset linux-asan
      # solution_runner_tests has two RAG-honest-failure subcases that
      # no longer hold (same as linux-debug + macos-debug above).
      - run: ctest --preset linux-asan -E "solution_runner_tests"

  rcli-macos:
    # rcli desktop CLI — full-backend release build + modelless smoke.
    # macos-14 pin for the same llama.cpp Metal / Xcode 16 reason as
    # macos-debug (the rcli preset enables GGML_METAL=ON).
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - run: brew install ninja protobuf
      - run: cmake --preset rcli-macos-release
      - run: cmake --build --preset rcli-macos-release
      - name: Smoke (modelless)
        run: |
          RCLI=build/rcli-macos-release/sdk/runanywhere-cli/rcli
          "$RCLI" version
          "$RCLI" backends
          "$RCLI" list --all
          "$RCLI" info --json

  rcli-linux:
    # rcli desktop CLI on Linux — release build, unit tests, modelless smoke.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y ninja-build libcurl4-openssl-dev
      - name: Sherpa-ONNX prebuilts
        run: ./sdk/runanywhere-commons/scripts/linux/download-sherpa-onnx.sh
      - run: cmake --preset rcli-linux-release -DRAC_BUILD_TESTS=ON
      - run: cmake --build --preset rcli-linux-release
      - name: Unit tests
        run: ctest --test-dir build/rcli-linux-release -R "rcli_unit_tests|desktop_adapter_tests" --output-on-failure
      - name: Smoke (modelless)
        run: |
          RCLI=build/rcli-linux-release/sdk/runanywhere-cli/rcli
          "$RCLI" version
          "$RCLI" backends
          "$RCLI" list --all
          "$RCLI" info --json

  wasm:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-toolchain
        with:
          platform: web
      - name: Configure (WASM)
        run: cmake --preset wasm
      - name: Build (WASM)
        run: cmake --build --preset wasm

  ios-device:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - run: brew install protobuf
      - name: Download vendored ONNX Runtime (iOS xcframework)
        run: bash sdk/runanywhere-commons/scripts/ios/download-onnx.sh
      - name: Download vendored Sherpa-ONNX (iOS xcframework)
        run: bash sdk/runanywhere-commons/scripts/ios/download-sherpa-onnx.sh
      - run: cmake --preset ios-device
      - run: cmake --build --preset ios-device --config Release

  android-arm64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-toolchain
        with:
          platform: android
      - run: sudo apt-get update && sudo apt-get install -y ninja-build
      - name: Download vendored Sherpa-ONNX (Android)
        run: bash sdk/runanywhere-commons/scripts/android/download-sherpa-onnx.sh
      - run: cmake --preset android-arm64
      - run: cmake --build --preset android-arm64

  # =============================================================================
  # Per-SDK frontend builds (call wrapper scripts, which internally drive cmake)
  # =============================================================================

  swift-spm:
    runs-on: macos-15
    needs: [ios-device]
    steps:
      - uses: actions/checkout@v4
      - run: brew install protobuf
      - name: Download vendored ONNX Runtime (iOS xcframework)
        run: bash sdk/runanywhere-commons/scripts/ios/download-onnx.sh
      - name: Download vendored Sherpa-ONNX (iOS xcframework)
        run: bash sdk/runanywhere-commons/scripts/ios/download-sherpa-onnx.sh
      - name: Build XCFramework
        run: ./sdk/runanywhere-swift/scripts/build-core-xcframework.sh
      - name: swift build
        run: swift build --target RunAnywhere
      # Per-SDK lint lane — fail PRs that introduce SwiftLint
      # violations or unused declarations. Soft (continue-on-error) until the
      # baseline is clean; flip to required gate once the backlog clears.
      - name: SwiftLint (lint lane)
        continue-on-error: true
        run: |
          if command -v swiftlint >/dev/null 2>&1; then
            swiftlint --strict --quiet || swiftlint --quiet
          else
            brew install swiftlint && swiftlint --quiet
          fi
      - name: Periphery unused-code scan (lint lane)
        continue-on-error: true
        run: |
          if command -v periphery >/dev/null 2>&1; then
            periphery scan --quiet || true
          else
            echo "periphery not installed on runner; skipping"
          fi

  kotlin-android:
    runs-on: ubuntu-22.04
    needs: [android-arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-toolchain
        with:
          platform: android
      - run: sudo apt-get update && sudo apt-get install -y ninja-build
      - name: Download vendored Sherpa-ONNX (Android)
        run: bash sdk/runanywhere-commons/scripts/android/download-sherpa-onnx.sh
      - name: Build Android JNI libs
        run: ./scripts/build/build-core-android.sh
      - name: gradle assembleDebug
        working-directory: sdk/runanywhere-kotlin
        run: ./gradlew assembleDebug
      - name: ktlintCheck + detekt (lint lane)
        continue-on-error: true
        working-directory: sdk/runanywhere-kotlin
        run: ./gradlew ktlintCheck detekt --no-daemon

  flutter-pubget:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      # FLUTTER_VERSION is sourced from sdk/runanywhere-commons/VERSIONS (single
      # source of truth) by the setup-toolchain action. Bump the value in
      # VERSIONS to roll the Flutter pin across pr-build, release, and FVM.
      - uses: ./.github/actions/setup-toolchain
        with:
          platform: flutter
      - run: cd sdk/runanywhere-flutter/packages/runanywhere && flutter pub get && flutter analyze --no-fatal-infos lib
      # Per-SDK lint lane — run melos analyze across the full
      # Flutter workspace (not just the single `runanywhere` package). Soft
      # gate (continue-on-error) until baseline is clean.
      - name: melos bootstrap + analyze (workspace lint lane)
        continue-on-error: true
        working-directory: sdk/runanywhere-flutter
        run: |
          if command -v melos >/dev/null 2>&1; then
            melos bootstrap && melos run analyze
          else
            dart pub global activate melos
            export PATH="$PATH:$HOME/.pub-cache/bin"
            melos bootstrap && melos run analyze
          fi

  rn-typecheck:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      # Repo root and sdk/runanywhere-react-native pin `packageManager: yarn@3.6.1`
      # (Yarn Berry). The runner's global yarn is 1.x and refuses to run, so we
      # activate the pinned version through Corepack before any `yarn` call.
      - name: Enable Corepack (yarn@3.6.1)
        run: |
          corepack enable
          corepack prepare yarn@3.6.1 --activate
      # Yarn 3 Berry: the project root with the workspaces declaration is the
      # REPO ROOT (which lists `sdk/runanywhere-react-native/packages/*` as
      # workspace members). `sdk/runanywhere-react-native` itself is NOT a
      # workspace member, so `cd sdk/runanywhere-react-native && yarn install`
      # fails the project-detection guard. Run yarn from the repo root and
      # target the specific workspace explicitly.
      - name: Yarn install (repo root)
        run: yarn install --immutable
      - name: Typecheck @runanywhere/core
        run: yarn workspace @runanywhere/core typecheck
      # Per-SDK lint lane — run eslint via the package's lint
      # script when an eslint config is present. Soft (continue-on-error) until
      # the lint config is committed and baseline is clean.
      - name: ESLint (@runanywhere/core lint lane)
        continue-on-error: true
        run: yarn workspace @runanywhere/core run lint || echo "eslint not yet wired"
      # Per-SDK unit-test lane. Smoke tests
      # cover Foundation/Errors and services/Proto* utilities; the runner
      # (ts-jest) is wired in `packages/core/jest.config.js`. Soft
      # (continue-on-error) until the in-tree jest devDependencies are
      # installed in the workspace lock — flip to required once the lane
      # exits 0 cleanly.
      - name: Jest unit tests (@runanywhere/core)
        continue-on-error: true
        run: yarn workspace @runanywhere/core run test || echo "jest devDeps not yet installed in workspace lock"

  web-typecheck:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      # Install + typecheck from the workspace root so the in-tree
      # @runanywhere/proto-ts package (sdk/shared/proto-ts) is resolved as a
      # workspace member instead of being fetched from the npm registry. The
      # `typecheck` script builds proto-ts first, then typechecks core,
      # llamacpp, and onnx — exactly the surface this PR touches.
      # proto-ts is a workspace member of BOTH the repo-root Yarn workspace AND
      # the sdk/runanywhere-web npm workspace. When we cd into proto-ts and run
      # `npm install`, npm walks up, finds the root Yarn package.json with
      # `workspace:*` deps it can't parse, and bails (EUNSUPPORTEDPROTOCOL).
      # `--workspaces=false` keeps npm from inheriting the root workspace
      # context and resolves the long/protobufjs deps in-tree directly.
      - name: Install proto-ts dependencies (standalone install)
        working-directory: sdk/shared/proto-ts
        run: npm install --no-audit --no-fund --workspaces=false
      - name: Install workspace dependencies
        working-directory: sdk/runanywhere-web
        run: npm install --no-audit --no-fund
      - name: Typecheck Web workspace (proto-ts + packages)
        working-directory: sdk/runanywhere-web
        run: npm run typecheck
      # Per-SDK lint lane — run eslint across the web workspace.
      # Soft (continue-on-error) until baseline is clean.
      - name: ESLint (web workspace lint lane)
        continue-on-error: true
        working-directory: sdk/runanywhere-web
        run: npm run lint || echo "eslint not yet wired"

  # Dedicated validation lane — runs the source-of-truth
  # validation scripts so deprecated-surface drift and RAC_API export drift
  # are caught in CI rather than landing silently. Soft (continue-on-error)
  # while we baseline; flip to required gate once both scripts exit 0 cleanly
  # on every supported commit.
  validation:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Deprecated surface check
        continue-on-error: true
        run: bash scripts/validation/gates/check_deprecated_surfaces.sh
      - name: RAC_API export drift check (strict)
        continue-on-error: true
        run: bash scripts/validation/commons/check_rac_api_exports.sh --strict
