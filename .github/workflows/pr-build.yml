name: PR build matrix

# GAP 07 Phase 7 rewrite — see v2_gap_specs/GAP_07_SINGLE_ROOT_CMAKE.md.
#
# This file replaces the previous 601-line workflow that called per-SDK
# build-*.sh scripts. After GAP 07 the canonical entry point is the root
# CMake + presets:
#
#   cmake --preset <preset>
#   cmake --build  --preset <preset>
#   ctest          --preset <preset>     # debug presets only
#
# The wrapper scripts under scripts/build-core-*.sh package the artifacts for
# each frontend SDK; per-SDK jobs that need those artifacts call the wrapper
# instead of duplicating cmake calls.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, "feat/v2-architecture"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =============================================================================
  # Native core builds (one job per CMake preset family)
  # =============================================================================

  macos-debug:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install ninja + protobuf
        run: brew install ninja protobuf
      - name: Configure
        run: cmake --preset macos-debug
      - name: Build
        run: cmake --build --preset macos-debug
      - name: Test
        run: ctest --preset macos-debug

  macos-release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - run: brew install ninja protobuf
      - run: cmake --preset macos-release
      - run: cmake --build --preset macos-release

  linux-debug:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install ninja + protobuf
        run: sudo apt-get update && sudo apt-get install -y ninja-build libprotobuf-dev protobuf-compiler
      - run: cmake --preset linux-debug
      - run: cmake --build --preset linux-debug
      - run: ctest --preset linux-debug

  linux-asan:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y ninja-build libprotobuf-dev protobuf-compiler
      - run: cmake --preset linux-asan
      - run: cmake --build --preset linux-asan
      - run: ctest --preset linux-asan

  ios-device:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - run: brew install protobuf
      - run: cmake --preset ios-device
      - run: cmake --build --preset ios-device --config Release

  android-arm64:
    runs-on: ubuntu-22.04
    env:
      ANDROID_NDK_HOME: ${{ github.workspace }}/android-ndk-r27c
    steps:
      - uses: actions/checkout@v4
      - name: Install Android NDK
        run: |
          curl -sSL -o ndk.zip https://dl.google.com/android/repository/android-ndk-r27c-linux.zip
          unzip -q ndk.zip
      - run: sudo apt-get update && sudo apt-get install -y ninja-build
      - run: cmake --preset android-arm64
      - run: cmake --build --preset android-arm64

  # =============================================================================
  # Per-SDK frontend builds (call wrapper scripts, which internally drive cmake)
  # =============================================================================

  swift-spm:
    runs-on: macos-14
    needs: [ios-device]
    steps:
      - uses: actions/checkout@v4
      - run: brew install protobuf
      - name: Build XCFramework
        run: ./scripts/build-core-xcframework.sh
      - name: swift build
        run: swift build --target RunAnywhere

  kotlin-android:
    runs-on: ubuntu-22.04
    needs: [android-arm64]
    env:
      ANDROID_NDK_HOME: ${{ github.workspace }}/android-ndk-r27c
    steps:
      - uses: actions/checkout@v4
      - run: |
          curl -sSL -o ndk.zip https://dl.google.com/android/repository/android-ndk-r27c-linux.zip
          unzip -q ndk.zip
      - run: sudo apt-get update && sudo apt-get install -y ninja-build
      - name: Build Android JNI libs
        run: ./scripts/build-core-android.sh
      - name: gradle assembleDebug
        run: ./gradlew :runanywhere-kotlin:assembleDebug

  flutter-pubget:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { flutter-version: '3.38.x' }
      - run: cd sdk/runanywhere-flutter/packages/runanywhere && flutter pub get && flutter analyze --no-fatal-infos lib

  rn-typecheck:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: cd sdk/runanywhere-react-native && yarn install --immutable
      - run: cd sdk/runanywhere-react-native/packages/core && yarn typecheck

  web-typecheck:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: cd sdk/runanywhere-web/packages/core && npm install --no-audit --no-fund && npx tsc --noEmit
