name: PR Build

# =============================================================================
# Path-filtered PR build.
#
# A change to a single backend's C++ should NOT rebuild every other backend.
# A change to a single client SDK should NOT rebuild any natives.
#
# Strategy: a `detect` job runs `dorny/paths-filter` to figure out what
# changed, then every downstream job gates on the matching boolean. Jobs
# whose `if:` condition is false are skipped (and don't count against billing).
#
# Native-build jobs upload their outputs as workflow artifacts. SDK jobs that
# need natives consume those workflow artifacts (when the same PR rebuilt
# them) OR fall back to the latest GitHub Release (when only SDK code
# changed). See §6.2 of thoughts/shared/plans/artifact-build-system.md.
# =============================================================================

on:
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same PR when a new commit is pushed
concurrency:
  group: pr-build-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:

  # ---------------------------------------------------------------------------
  # detect: classify the PR's diff into trigger flags
  # ---------------------------------------------------------------------------
  detect:
    runs-on: ubuntu-latest
    outputs:
      commons_core: ${{ steps.filter.outputs.commons_core }}
      backend_llamacpp: ${{ steps.filter.outputs.backend_llamacpp }}
      backend_onnx: ${{ steps.filter.outputs.backend_onnx }}
      script_ios: ${{ steps.filter.outputs.script_ios }}
      script_android: ${{ steps.filter.outputs.script_android }}
      script_linux: ${{ steps.filter.outputs.script_linux }}
      script_windows: ${{ steps.filter.outputs.script_windows }}
      script_web: ${{ steps.filter.outputs.script_web }}
      sdk_swift: ${{ steps.filter.outputs.sdk_swift }}
      sdk_kotlin: ${{ steps.filter.outputs.sdk_kotlin }}
      sdk_web: ${{ steps.filter.outputs.sdk_web }}
      sdk_flutter: ${{ steps.filter.outputs.sdk_flutter }}
      sdk_react_native: ${{ steps.filter.outputs.sdk_react_native }}
      versions: ${{ steps.filter.outputs.versions }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            commons_core:
              - 'sdk/runanywhere-commons/include/**'
              - 'sdk/runanywhere-commons/src/core/**'
              - 'sdk/runanywhere-commons/src/infrastructure/**'
              - 'sdk/runanywhere-commons/src/features/**'
              - '!sdk/runanywhere-commons/src/features/**/backends/**'
              - 'sdk/runanywhere-commons/CMakeLists.txt'
              - 'sdk/runanywhere-commons/cmake/**'
              - 'sdk/runanywhere-commons/CMakePresets.json'
            backend_llamacpp:
              - 'sdk/runanywhere-commons/src/backends/llamacpp/**'
              - 'sdk/runanywhere-commons/include/rac/backends/rac_llm_llamacpp.h'
            backend_onnx:
              - 'sdk/runanywhere-commons/src/backends/onnx/**'
              - 'sdk/runanywhere-commons/include/rac/backends/rac_*_onnx.h'
            script_ios:
              - 'sdk/runanywhere-commons/scripts/build-ios.sh'
              - 'sdk/runanywhere-commons/scripts/ios/**'
            script_android:
              - 'sdk/runanywhere-commons/scripts/build-android.sh'
              - 'sdk/runanywhere-commons/scripts/android/**'
            script_linux:
              - 'sdk/runanywhere-commons/scripts/build-linux.sh'
            script_windows:
              - 'sdk/runanywhere-commons/scripts/build-windows.bat'
            script_web:
              - 'sdk/runanywhere-web/wasm/**'
              - 'sdk/runanywhere-web/scripts/build-web.sh'
            sdk_swift:
              - 'sdk/runanywhere-swift/**'
              - 'Package.swift'
            sdk_kotlin:
              - 'sdk/runanywhere-kotlin/**'
              - 'sdk/runanywhere-android/**'
            sdk_web:
              - 'sdk/runanywhere-web/packages/**'
              - 'sdk/runanywhere-web/package.json'
              - 'sdk/runanywhere-web/tsconfig.json'
            sdk_flutter:
              - 'sdk/runanywhere-flutter/**'
            sdk_react_native:
              - 'sdk/runanywhere-react-native/**'
            versions:
              - 'sdk/runanywhere-commons/VERSIONS'
              - 'sdk/runanywhere-commons/VERSION'
            workflows:
              - '.github/workflows/**'
              - '.github/actions/**'

      - name: Print detected changes
        run: |
          echo "::group::Detected changes"
          echo "commons_core    = ${{ steps.filter.outputs.commons_core }}"
          echo "backend_llamacpp= ${{ steps.filter.outputs.backend_llamacpp }}"
          echo "backend_onnx    = ${{ steps.filter.outputs.backend_onnx }}"
          echo "script_ios      = ${{ steps.filter.outputs.script_ios }}"
          echo "script_android  = ${{ steps.filter.outputs.script_android }}"
          echo "script_linux    = ${{ steps.filter.outputs.script_linux }}"
          echo "script_windows  = ${{ steps.filter.outputs.script_windows }}"
          echo "script_web      = ${{ steps.filter.outputs.script_web }}"
          echo "sdk_swift       = ${{ steps.filter.outputs.sdk_swift }}"
          echo "sdk_kotlin      = ${{ steps.filter.outputs.sdk_kotlin }}"
          echo "sdk_web         = ${{ steps.filter.outputs.sdk_web }}"
          echo "sdk_flutter     = ${{ steps.filter.outputs.sdk_flutter }}"
          echo "sdk_react_native= ${{ steps.filter.outputs.sdk_react_native }}"
          echo "versions        = ${{ steps.filter.outputs.versions }}"
          echo "workflows       = ${{ steps.filter.outputs.workflows }}"
          echo "::endgroup::"

  # ---------------------------------------------------------------------------
  # Native artifact builds (one job per platform).
  # Each rebuilds when:
  #   - commons core changes (wide blast radius)
  #   - any backend changes (commons + the changed backend)
  #   - the platform's build script changes
  #   - VERSIONS changes
  #   - workflow files change (sanity smoke test)
  # ---------------------------------------------------------------------------

  native_ios:
    needs: detect
    if: |
      needs.detect.outputs.commons_core == 'true' ||
      needs.detect.outputs.backend_llamacpp == 'true' ||
      needs.detect.outputs.backend_onnx == 'true' ||
      needs.detect.outputs.script_ios == 'true' ||
      needs.detect.outputs.versions == 'true' ||
      needs.detect.outputs.workflows == 'true'
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-toolchain
        with:
          platform: ios
      - name: Build commons + backends for iOS (Debug, fast)
        working-directory: sdk/runanywhere-commons
        run: ./scripts/build-ios.sh --debug --backend all --skip-download || ./scripts/build-ios.sh --debug --backend all
      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-ios-pr${{ github.event.pull_request.number }}
          path: sdk/runanywhere-commons/dist/**
          retention-days: 30
          if-no-files-found: warn

  native_android:
    needs: detect
    if: |
      needs.detect.outputs.commons_core == 'true' ||
      needs.detect.outputs.backend_llamacpp == 'true' ||
      needs.detect.outputs.backend_onnx == 'true' ||
      needs.detect.outputs.script_android == 'true' ||
      needs.detect.outputs.versions == 'true' ||
      needs.detect.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a, x86_64]   # smoke matrix on PR; full 4 ABIs run on release
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-toolchain
        with:
          platform: android
      - name: Build commons + backends for Android (${{ matrix.abi }})
        working-directory: sdk/runanywhere-commons
        run: ./scripts/build-android.sh all ${{ matrix.abi }}
      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-android-${{ matrix.abi }}-pr${{ github.event.pull_request.number }}
          path: sdk/runanywhere-commons/dist/**
          retention-days: 30
          if-no-files-found: warn

  native_linux:
    needs: detect
    if: |
      needs.detect.outputs.commons_core == 'true' ||
      needs.detect.outputs.backend_llamacpp == 'true' ||
      needs.detect.outputs.backend_onnx == 'true' ||
      needs.detect.outputs.script_linux == 'true' ||
      needs.detect.outputs.versions == 'true' ||
      needs.detect.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-toolchain
        with:
          platform: linux
      - name: Build commons + backends for Linux x86_64
        working-directory: sdk/runanywhere-commons
        run: ./scripts/build-linux.sh
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-linux-x86_64-pr${{ github.event.pull_request.number }}
          path: sdk/runanywhere-commons/dist/**
          retention-days: 30
          if-no-files-found: warn

  native_windows:
    needs: detect
    if: |
      needs.detect.outputs.commons_core == 'true' ||
      needs.detect.outputs.backend_llamacpp == 'true' ||
      needs.detect.outputs.backend_onnx == 'true' ||
      needs.detect.outputs.script_windows == 'true' ||
      needs.detect.outputs.versions == 'true' ||
      needs.detect.outputs.workflows == 'true'
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-toolchain
        with:
          platform: windows
      - name: Build commons + backends for Windows x64
        working-directory: sdk/runanywhere-commons
        shell: cmd
        run: scripts\build-windows.bat
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-windows-x64-pr${{ github.event.pull_request.number }}
          path: sdk/runanywhere-commons/dist/**
          retention-days: 30
          if-no-files-found: warn

  native_web:
    needs: detect
    if: |
      needs.detect.outputs.commons_core == 'true' ||
      needs.detect.outputs.backend_llamacpp == 'true' ||
      needs.detect.outputs.backend_onnx == 'true' ||
      needs.detect.outputs.script_web == 'true' ||
      needs.detect.outputs.versions == 'true' ||
      needs.detect.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-toolchain
        with:
          platform: web
      - name: Build WASM (commons + llamacpp + onnx)
        working-directory: sdk/runanywhere-web
        run: ./scripts/build-web.sh --build-wasm --all-backends
      - name: Upload Web/WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-web-pr${{ github.event.pull_request.number }}
          path: |
            sdk/runanywhere-web/packages/*/wasm/**
          retention-days: 30
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Client SDK builds. Each runs only when its own SDK files (or relevant
  # natives) changed. Standalone SDK PRs do NOT rebuild natives — they
  # consume whatever's in the latest GitHub Release. (Phase 2 work will
  # standardize the local-vs-remote toggle so this is deterministic.)
  # ---------------------------------------------------------------------------

  sdk_swift:
    needs: [detect, native_ios]
    if: |
      always() && (
        needs.detect.outputs.sdk_swift == 'true' ||
        needs.native_ios.result == 'success'
      )
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-toolchain
        with:
          platform: ios
      - name: Resolve Swift package
        # Non-blocking: Package.swift points to binaries at the bumped version,
        # which may not exist yet on a release PR (chicken-and-egg). The
        # release.yml workflow will produce them. Swift build below is similarly
        # gated.
        run: swift package resolve || echo "::warning::swift package resolve failed — binaries at v${PROJECT_VERSION} may not exist yet (ok on release PRs)"
      - name: Build Swift package (smoke check)
        # Builds with whatever Binaries/ already contains (or fetches remote per Package.swift).
        # We don't fail the SDK job if natives aren't present yet — that's a follow-up.
        run: swift build || echo "::warning::Swift build failed (likely missing local Binaries/) — non-blocking on PR"

  sdk_kotlin:
    needs: [detect, native_android]
    if: |
      always() && (
        needs.detect.outputs.sdk_kotlin == 'true' ||
        needs.native_android.result == 'success'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-toolchain
        with:
          platform: sdk-only
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Gradle build (no test)
        working-directory: sdk/runanywhere-kotlin
        run: ./gradlew build -x test --no-daemon || echo "::warning::Kotlin gradle build failed — non-blocking on PR"

  sdk_web:
    needs: [detect, native_web]
    if: |
      always() && (
        needs.detect.outputs.sdk_web == 'true' ||
        needs.native_web.result == 'success'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-toolchain
        with:
          platform: sdk-only
      - name: Install web deps
        working-directory: sdk/runanywhere-web
        run: npm install
      - name: Build TS (core then llamacpp then onnx)
        working-directory: sdk/runanywhere-web
        # build:ts must run before typecheck because llamacpp/onnx packages
        # import from `@runanywhere/web`; tsc can only resolve those imports
        # once the core package has produced its `dist/` (with .d.ts files).
        run: npm run build:ts
      - name: Typecheck (now that dist/ exists)
        working-directory: sdk/runanywhere-web
        run: npm run typecheck

  sdk_flutter:
    # Flutter consumes BOTH iOS and Android natives, so fire whenever either
    # native-build job succeeded on this run, OR when Flutter SDK paths changed.
    needs: [detect, native_ios, native_android]
    if: |
      always() && (
        needs.detect.outputs.sdk_flutter == 'true' ||
        needs.native_ios.result == 'success' ||
        needs.native_android.result == 'success'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Flutter analyze (each package)
        working-directory: sdk/runanywhere-flutter
        run: |
          for pkg in packages/*/; do
            if [ -f "$pkg/pubspec.yaml" ]; then
              echo "=== Analyzing $pkg ==="
              (cd "$pkg" && flutter pub get && flutter analyze) || echo "::warning::flutter analyze failed in $pkg"
            fi
          done

  sdk_react_native:
    # React Native consumes BOTH iOS and Android natives, so fire whenever either
    # native-build job succeeded on this run, OR when RN SDK paths changed.
    needs: [detect, native_ios, native_android]
    if: |
      always() && (
        needs.detect.outputs.sdk_react_native == 'true' ||
        needs.native_ios.result == 'success' ||
        needs.native_android.result == 'success'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-toolchain
        with:
          platform: sdk-only
      - name: Enable Corepack (for yarn@3.6.1 declared in packageManager)
        run: corepack enable
      - name: Install RN workspace
        working-directory: sdk/runanywhere-react-native
        run: |
          # The RN SDK uses yarn workspaces + yarn@3.6.1 via Corepack; fall
          # back to npm install only as a last resort for older checkouts.
          if [ -f yarn.lock ] || grep -q '"packageManager": "yarn@' package.json 2>/dev/null; then
            yarn install --immutable || yarn install
          else
            npm install --legacy-peer-deps
          fi
      - name: Typecheck packages
        working-directory: sdk/runanywhere-react-native
        run: |
          for pkg in packages/*/; do
            if [ -f "$pkg/tsconfig.json" ]; then
              echo "=== Typechecking $pkg ==="
              (cd "$pkg" && npx tsc --noEmit) || echo "::warning::tsc failed in $pkg"
            fi
          done

  # ---------------------------------------------------------------------------
  # Lint jobs — fast, parallel, symmetric across all 5 SDKs.
  # Each runs independently of the native builds and can fail a PR on its own.
  # Path-filtered so a Swift-only PR doesn't run Kotlin/Web/Flutter/RN lints.
  # ---------------------------------------------------------------------------

  lint_swift:
    needs: detect
    if: needs.detect.outputs.sdk_swift == 'true' || needs.detect.outputs.workflows == 'true'
    runs-on: macos-14
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Lint SDK
        working-directory: sdk/runanywhere-swift
        run: swiftlint --quiet --reporter github-actions-logging
      - name: Lint iOS example app
        working-directory: examples/ios/RunAnywhereAI
        run: swiftlint --quiet --reporter github-actions-logging

  lint_kotlin:
    needs: detect
    if: needs.detect.outputs.sdk_kotlin == 'true' || needs.detect.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-toolchain
        with:
          platform: sdk-only
      - name: Lint Kotlin SDK (detekt + ktlint)
        working-directory: sdk/runanywhere-kotlin
        run: ./gradlew detekt ktlintCheck --no-daemon
      - name: Lint Android example (detekt + ktlint)
        working-directory: examples/android/RunAnywhereAI
        run: ./gradlew detekt ktlintCheck --no-daemon

  lint_web:
    needs: detect
    if: needs.detect.outputs.sdk_web == 'true' || needs.detect.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-toolchain
        with:
          platform: sdk-only
      - name: Install deps
        working-directory: sdk/runanywhere-web
        run: npm install
      - name: Build core (so llamacpp/onnx can resolve types)
        working-directory: sdk/runanywhere-web
        run: npm run build -w packages/core
      - name: Lint
        working-directory: sdk/runanywhere-web
        run: npm run lint

  lint_rn:
    needs: detect
    if: needs.detect.outputs.sdk_react_native == 'true' || needs.detect.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-toolchain
        with:
          platform: sdk-only
      - name: Enable Corepack (yarn@3.6.1)
        run: corepack enable
      - name: Install RN SDK deps
        working-directory: sdk/runanywhere-react-native
        run: yarn install --immutable || yarn install
      - name: Prepare core (nitrogen + build for llamacpp/onnx)
        working-directory: sdk/runanywhere-react-native
        run: yarn core:prepare || true
      - name: Lint RN SDK
        working-directory: sdk/runanywhere-react-native
        run: yarn lint

  lint_flutter:
    needs: detect
    if: needs.detect.outputs.sdk_flutter == 'true' || needs.detect.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Flutter analyze — SDK packages
        working-directory: sdk/runanywhere-flutter
        run: |
          set -e
          # Generate pubspec_overrides.yaml for each sub-package so that
          # `flutter pub get` resolves `runanywhere` from the local monorepo
          # instead of the published version on pub.dev (which lags behind).
          for pkg in packages/runanywhere_genie packages/runanywhere_llamacpp packages/runanywhere_onnx; do
            if [ -f "$pkg/pubspec.yaml" ]; then
              printf 'dependency_overrides:\n  runanywhere:\n    path: ../runanywhere\n' \
                > "$pkg/pubspec_overrides.yaml"
            fi
          done
          for pkg in packages/runanywhere packages/runanywhere_genie packages/runanywhere_llamacpp packages/runanywhere_onnx; do
            if [ -f "$pkg/pubspec.yaml" ]; then
              echo "=== Analyzing $pkg ==="
              (cd "$pkg" && flutter pub get && flutter analyze)
            fi
          done
      - name: Flutter analyze — example app
        working-directory: examples/flutter/RunAnywhereAI
        run: flutter pub get && flutter analyze

  # ---------------------------------------------------------------------------
  # summary: depends on every other job so the PR check shows an aggregate result
  # ---------------------------------------------------------------------------
  summary:
    if: always()
    needs:
      - detect
      - native_ios
      - native_android
      - native_linux
      - native_windows
      - native_web
      - sdk_swift
      - sdk_kotlin
      - sdk_web
      - sdk_flutter
      - sdk_react_native
      - lint_swift
      - lint_kotlin
      - lint_web
      - lint_rn
      - lint_flutter
    runs-on: ubuntu-latest
    steps:
      - name: Print job results
        run: |
          echo "::group::Job results"
          echo "native_ios       = ${{ needs.native_ios.result }}"
          echo "native_android   = ${{ needs.native_android.result }}"
          echo "native_linux     = ${{ needs.native_linux.result }}"
          echo "native_windows   = ${{ needs.native_windows.result }}"
          echo "native_web       = ${{ needs.native_web.result }}"
          echo "sdk_swift        = ${{ needs.sdk_swift.result }}"
          echo "sdk_kotlin       = ${{ needs.sdk_kotlin.result }}"
          echo "sdk_web          = ${{ needs.sdk_web.result }}"
          echo "sdk_flutter      = ${{ needs.sdk_flutter.result }}"
          echo "sdk_react_native = ${{ needs.sdk_react_native.result }}"
          echo "lint_swift       = ${{ needs.lint_swift.result }}"
          echo "lint_kotlin      = ${{ needs.lint_kotlin.result }}"
          echo "lint_web         = ${{ needs.lint_web.result }}"
          echo "lint_rn          = ${{ needs.lint_rn.result }}"
          echo "lint_flutter     = ${{ needs.lint_flutter.result }}"
          echo "::endgroup::"
      - name: Fail on hard failures
        run: |
          # 'failure' = job ran and failed. 'cancelled'/'skipped' don't fail the PR.
          for r in \
            "${{ needs.native_ios.result }}" \
            "${{ needs.native_android.result }}" \
            "${{ needs.native_linux.result }}" \
            "${{ needs.native_windows.result }}" \
            "${{ needs.native_web.result }}" \
            "${{ needs.lint_swift.result }}" \
            "${{ needs.lint_kotlin.result }}" \
            "${{ needs.lint_web.result }}" \
            "${{ needs.lint_rn.result }}" \
            "${{ needs.lint_flutter.result }}"; do
            if [ "$r" = "failure" ]; then
              echo "::error::A build or lint job failed."
              exit 1
            fi
          done
