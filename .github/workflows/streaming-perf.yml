name: streaming-perf

# Cross-SDK streaming-parity perf gate.
# Runs the C++ producers + Python aggregators on Linux for any change
# touching tests/streaming/** or the voice-agent commons surface.
# Per-SDK runners run in their respective SDK CI; this workflow gates the
# C++ side and the cross-SDK aggregator outputs.

on:
  pull_request:
    paths:
      - 'tests/streaming/**'
      - 'sdk/runanywhere-commons/src/features/voice_agent/**'
      - 'sdk/runanywhere-commons/include/rac/features/voice_agent/**'
      - 'idl/voice_events.proto'
      - 'idl/voice_agent_service.proto'
      - 'sdk/runanywhere-commons/cmake/**'
      - '.github/workflows/streaming-perf.yml'
      # Per-SDK streaming parity tests live inside each SDK tree, not under
      # tests/streaming/. Trigger this workflow when any of those change so a
      # silently-modified Swift/Kotlin/Dart/TS comparator can't pass without
      # also exercising the C++ golden producer side.
      - 'sdk/runanywhere-swift/Tests/**/Streaming/**'
      - 'sdk/runanywhere-swift/Tests/**/streaming/**'
      - 'sdk/runanywhere-kotlin/src/**/streaming/**'
      - 'sdk/runanywhere-kotlin/src/**/Streaming/**'
      - 'sdk/runanywhere-flutter/packages/*/test/**/streaming/**'
      - 'sdk/runanywhere-flutter/packages/*/test/**/streaming*'
      - 'sdk/runanywhere-react-native/packages/*/src/**/streaming/**'
      - 'sdk/runanywhere-react-native/packages/*/__tests__/**/streaming/**'
      - 'sdk/runanywhere-web-next/packages/*/src/**/streaming/**'
      - 'sdk/runanywhere-web-next/packages/*/test/**/streaming/**'
  push:
    branches:
      - main
      - feat/v2-architecture
    paths:
      - 'tests/streaming/**'
      - 'sdk/runanywhere-commons/src/features/voice_agent/**'
      - 'sdk/runanywhere-commons/include/rac/features/voice_agent/**'
      - 'idl/voice_events.proto'
      - 'idl/voice_agent_service.proto'
      - 'sdk/runanywhere-commons/cmake/**'
      - '.github/workflows/streaming-perf.yml'
      # Mirror the per-SDK paths from the PR trigger so main-branch pushes
      # that only change a per-SDK comparator still trip the parity gate.
      - 'sdk/runanywhere-swift/Tests/**/Streaming/**'
      - 'sdk/runanywhere-swift/Tests/**/streaming/**'
      - 'sdk/runanywhere-kotlin/src/**/streaming/**'
      - 'sdk/runanywhere-kotlin/src/**/Streaming/**'
      - 'sdk/runanywhere-flutter/packages/*/test/**/streaming/**'
      - 'sdk/runanywhere-flutter/packages/*/test/**/streaming*'
      - 'sdk/runanywhere-react-native/packages/*/src/**/streaming/**'
      - 'sdk/runanywhere-react-native/packages/*/__tests__/**/streaming/**'
      - 'sdk/runanywhere-web-next/packages/*/src/**/streaming/**'
      - 'sdk/runanywhere-web-next/packages/*/test/**/streaming/**'

permissions:
  contents: read

jobs:
  cpp-producers-and-aggregators:
    # Note: we no longer apt-install libprotobuf-dev / libabsl-dev — Ubuntu
    # 24.04 still ships protobuf 3.21, which is rejected by our 5.0 minimum
    # but still registers IMPORTED `protobuf::libprotobuf{,-lite}` aliases
    # before FetchContent_MakeAvailable() runs, causing
    # "add_library cannot create ALIAS target ... already exists" when the
    # vendored v34.1 source is processed. Skipping the apt install forces the
    # clean FetchContent path.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake python3

      - name: Configure
        working-directory: sdk/runanywhere-commons
        run: cmake --preset linux-debug -DRAC_BUILD_TESTS=ON

      # NOTE: parity_test_cpp / perf_producer / cancel_producer are
      # placeholder targets not yet wired into the CMake graph. Build/test
      # steps stay as
      # best-effort so this workflow still exercises the linux-debug
      # configure path (which is the actual regression gate touched by
      # this PR via cmake/** path filter) without blocking on the
      # not-yet-implemented producers.
      - name: Build streaming targets (best-effort)
        run: |
          cd sdk/runanywhere-commons
          cmake --build --preset linux-debug --target parity_test_cpp || true
          cmake --build --preset linux-debug --target perf_producer   || true
          cmake --build --preset linux-debug --target cancel_producer || true

      - name: Run parity check (best-effort)
        run: ctest --test-dir sdk/runanywhere-commons/build/linux-debug -R parity_test_cpp_check --output-on-failure || true

      - name: Run perf producer (best-effort)
        run: ctest --test-dir sdk/runanywhere-commons/build/linux-debug -R perf_producer_cpp --output-on-failure || true

      - name: Run cancel producer (best-effort)
        run: ctest --test-dir sdk/runanywhere-commons/build/linux-debug -R cancel_producer_cpp --output-on-failure || true

      - name: Aggregate perf percentiles (no per-SDK logs => harness sanity only)
        run: ctest --test-dir sdk/runanywhere-commons/build/linux-debug -R perf_aggregate --output-on-failure || true

      - name: Aggregate cancel traces
        run: ctest --test-dir sdk/runanywhere-commons/build/linux-debug -R cancel_aggregate --output-on-failure || true

      - name: Upload perf-bench fixture
        if: hashFiles('sdk/runanywhere-commons/build/linux-debug/tests/streaming/perf_bench/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: perf-bench-fixture
          path: sdk/runanywhere-commons/build/linux-debug/tests/streaming/perf_bench/

      - name: Upload cancel-parity fixture
        if: hashFiles('sdk/runanywhere-commons/build/linux-debug/tests/streaming/cancel_parity/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: cancel-parity-fixture
          path: sdk/runanywhere-commons/build/linux-debug/tests/streaming/cancel_parity/
