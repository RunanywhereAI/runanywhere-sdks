name: runanywhere_v2
description: RunAnywhere v2 — Dart/Flutter frontend adapter (thin FFI wrapper around the C++ core).
version: 2.0.0-dev.1
homepage: https://runanywhere.ai
repository: https://github.com/RunanywhereAI/runanywhere-sdks
issue_tracker: https://github.com/RunanywhereAI/runanywhere-sdks/issues

environment:
  sdk: ^3.4.0
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.0
  protobuf: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      linux:
        ffiPlugin: true
