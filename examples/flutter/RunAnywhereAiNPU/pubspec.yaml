name: runanywhere_ai_npu
description: "RunAnywhere QHexRT NPU demo (Flutter)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  runanywhere:
    path: ../../../sdk/runanywhere-flutter/packages/runanywhere
  runanywhere_qhexrt:
    path: ../../../sdk/runanywhere-flutter/packages/runanywhere_qhexrt

  image_picker: ^1.1.2
  record: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

dependency_overrides:
  runanywhere:
    path: ../../../sdk/runanywhere-flutter/packages/runanywhere
  runanywhere_qhexrt:
    path: ../../../sdk/runanywhere-flutter/packages/runanywhere_qhexrt

flutter:
  uses-material-design: true

  fonts:
    - family: Figtree
      fonts:
        - asset: assets/fonts/figtree.ttf
    - family: MapleMono
      fonts:
        - asset: assets/fonts/maple_mono.ttf
