name: runanywhere_ai
description: RunAnywhere AI - On-device AI assistant showcasing LLM, STT, TTS, VLM, and RAG capabilities
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3
  flutter: '>=3.41.0'

dependencies:
  flutter:
    sdk: flutter

  # RunAnywhere SDK
  runanywhere:
    path: ../../../sdk/runanywhere-flutter/packages/runanywhere
  runanywhere_llamacpp:
    path: ../../../sdk/runanywhere-flutter/packages/runanywhere_llamacpp
  runanywhere_genie:
    path: ../../../sdk/runanywhere-flutter/packages/runanywhere_genie
  runanywhere_onnx:
    path: ../../../sdk/runanywhere-flutter/packages/runanywhere_onnx

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Icons
  tabler_icons_next: ^3.34.0

  # UI
  flutter_markdown: ^0.7.7
  google_fonts: ^6.2.1

  # Audio
  record: ^6.1.0
  audioplayers: ^6.1.0

  # Permissions
  permission_handler: ^11.3.1

  # Storage
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.0.0
  path_provider: ^2.1.5

  # Device & Package Info
  device_info_plus: ^10.1.2
  package_info_plus: ^8.3.0

  # Utilities
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  http: ^1.3.0

  # Camera & Media
  camera: ^0.11.1
  image_picker: ^1.1.2
  image: ^4.5.3

  # Documents
  file_picker: ^10.1.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

dependency_overrides:
  runanywhere:
    path: ../../../sdk/runanywhere-flutter/packages/runanywhere
  runanywhere_llamacpp:
    path: ../../../sdk/runanywhere-flutter/packages/runanywhere_llamacpp
  runanywhere_genie:
    path: ../../../sdk/runanywhere-flutter/packages/runanywhere_genie
  runanywhere_onnx:
    path: ../../../sdk/runanywhere-flutter/packages/runanywhere_onnx

flutter:
  uses-material-design: true
