plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

android {
    namespace "com.runanywhere.runanywhere_ai"
    compileSdkVersion 36
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.runanywhere.runanywhere_ai"
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion 34
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    signingConfigs {
        release {
            def keystorePath = System.getenv("KEYSTORE_PATH")
            def keystorePassword = System.getenv("KEYSTORE_PASSWORD")
            def releaseKeyAlias = System.getenv("KEY_ALIAS")
            def releaseKeyPassword = System.getenv("KEY_PASSWORD")

            if (keystorePath && keystorePassword && releaseKeyAlias && releaseKeyPassword) {
                storeFile file(keystorePath)
                storePassword keystorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
            }
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release.storeFile != null ? signingConfigs.release : signingConfigs.debug
            // Android shell shrinking. The Dart app is AOT-compiled (not touched
            // by R8); these rules just keep the Flutter embedding + the
            // runanywhere/QHexRT plugin JNI surface that R8 would otherwise strip.
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    packagingOptions {
        // libc++_shared.so ships from every Flutter plugin that consumes
        // runanywhere native .so files — AGP needs a tie-breaker.
        pickFirst '**/libc++_shared.so'
        pickFirst '**/libomp.so'
        // QHexRT (QNN) needs the Hexagon HTP skel .so files (libQnnHtpV*Skel.so)
        // to exist as real on-disk files: FastRPC fopen()s them to offload to the
        // cDSP. With useLegacyPackaging=false the skels are page-mapped from the
        // APK with no on-disk file, so the DSP load fails ("cannot open
        // libQnnHtpV81Skel.so, errno 2") and QHexRT model load fails. Legacy
        // packaging extracts them to nativeLibraryDir, matching the working
        // Kotlin app. The .so set is built 16 KB-aligned, so the extracted files
        // still mmap cleanly on 16 KB-page (Android 15+/16) devices.
        jniLibs {
            useLegacyPackaging = true
        }
    }
}

flutter {
    source '../..'
}

dependencies {}
