apply plugin: "com.android.library"

android {
    namespace "com.runanywhere.rn"
    compileSdk 34

    defaultConfig {
        minSdk 24
        targetSdk 34
        externalNativeBuild {
            cmake {
                cppFlags "-std=c++20"
                arguments "-DANDROID_STL=c++_shared"
            }
        }
    }

    externalNativeBuild {
        cmake {
            path "../cpp/CMakeLists.txt"
        }
    }

    packagingOptions {
        jniLibs {
            pickFirsts += ['**/libracommons_core.so']
        }
    }
}

dependencies {
    implementation "com.facebook.react:react-android:0.76.0"
    implementation "com.margelo.nitro:nitro-modules:0.25.0"
}
