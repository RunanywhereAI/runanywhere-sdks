name: runanywhere_flutter_workspace
publish_to: none

environment:
  sdk: '>=3.6.0 <4.0.0'

workspace:
  - packages/runanywhere
  - packages/runanywhere_llamacpp
  - packages/runanywhere_onnx
  - packages/runanywhere_genie

dev_dependencies:
  melos: 6.3.2

melos:
  command:
    version:
      workspaceChangelog: true

    bootstrap:
      runPubGetInParallel: true

  # Centralized dependency version registry (Tier 4 - PR #494 T4.4).
  #
  # Source of truth for every third-party dependency version that is shared
  # across more than one Flutter package in this workspace. Per-package
  # pubspec.yaml files should either:
  #   (a) reference the same `^x.y.z` constraint listed below, or
  #   (b) declare the dependency as `any` and rely on Dart pub workspace
  #       resolution (`resolution: workspace`) to inherit the constraint
  #       from the package that owns the version (typically `runanywhere`).
  #
  # The `scripts/validation/check_flutter_centralization.sh` script warns
  # whenever a package outside this block hardcodes a `^x.y.z` version that
  # differs from the entry below.
  #
  # Bumping versions: change here AND in the owning package's pubspec.yaml
  # (the package that does NOT use `any`). Then run `melos bs --no-select`.
  dependencies:
    # Runtime
    ffi: ^2.2.0
    protobuf: ^3.1.0
    fixnum: ^1.1.1
    shared_preferences: ^2.5.5
    path_provider: ^2.1.5
    flutter_secure_storage: ^10.2.0
    device_info_plus: ^12.4.0
    uuid: ^4.5.3

    # Dev / tooling
    flutter_lints: ^5.0.0
    test: ^1.24.0
    # Pinned (not caret) so local + CI codegen produces byte-identical output.
    # Must stay in lockstep with scripts/setup-toolchain.sh and
    # idl/codegen/generate_dart.sh (PROTOC_PLUGIN_DART_EXPECTED=22.0.0).
    # 22.0.0 is the latest 22.x compatible with protobuf ^3.x; 22.1.0+ require
    # protobuf ^4.x which is a breaking-change track we are not on yet.
    protoc_plugin: 22.0.0

  scripts:
    analyze:
      run: melos exec -c 1 -- flutter analyze --no-pub .
      description: Run flutter analyze in all packages

    format:
      run: melos exec -- dart format .
      description: Run dart format in all packages

    test:
      run: melos exec -- flutter test
      description: Run tests in all packages

    clean:
      run: melos exec -- flutter clean
      description: Run flutter clean in all packages
