name: runanywhere_genie
description: Experimental Android-only Qualcomm Genie backend shell for RunAnywhere. Disabled by default; requires Qualcomm Genie SDK-backed native ops to enable LLM routing.
version: 0.19.13
homepage: https://runanywhere.ai
repository: https://github.com/RunanywhereAI/runanywhere-sdks
issue_tracker: https://github.com/RunanywhereAI/runanywhere-sdks/issues
topics:
  - ai
  - llm
  - npu
  - qualcomm
  - on-device

environment:
  sdk: '>=3.10.0 <4.0.0'
  flutter: '>=3.24.0 <4.0.0'

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  # Core SDK dependency (provides RACommons).
  # Backend packages must lockstep with the core/native ABI: the published
  # 0.19.13 backend ships against the 0.19.13 native binaries, so the version
  # range floor MUST match this release. ^0.19.13 still permits any 0.19.x
  # patch >=13 (and any future 0.19.x minor in the caret range), so consumers
  # can still upgrade core within the published patch suite.
  runanywhere: ^0.19.13
  # Workspace-resolved: actual constraint lives in the
  # packages/runanywhere pubspec (the workspace source of truth — see
  # the centralization comment block in sdk/runanywhere-flutter/pubspec.yaml).
  # `any` defers to that single resolution so we never carry a duplicate
  # floor that can drift out of lockstep.
  ffi: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: any

flutter:
  uses-material-design: true

  # Native plugin configuration.
  # Experimental Android-only backend shell. It remains non-routable until
  # Qualcomm Genie SDK-backed native ops are present on Snapdragon devices.
  plugin:
    platforms:
      android:
        package: ai.runanywhere.sdk.genie
        pluginClass: GeniePlugin
      ios:
        pluginClass: GeniePlugin
