name: runanywhere_qhexrt
description: Private Android-only Qualcomm Hexagon NPU (QHexRT) backend for RunAnywhere. Runs prebuilt QNN context binaries on Snapdragon v79/v81 NPUs.
version: 0.1.5
homepage: https://runanywhere.ai
repository: https://github.com/RunanywhereAI/runanywhere-sdks
issue_tracker: https://github.com/RunanywhereAI/runanywhere-sdks/issues
topics:
  - ai
  - llm
  - npu
  - qualcomm
  - on-device

environment:
  sdk: '>=3.10.0 <4.0.0'
  flutter: '>=3.24.0'

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  runanywhere: ^0.19.13
  ffi: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: any

flutter:
  uses-material-design: true
  plugin:
    platforms:
      android:
        package: ai.runanywhere.sdk.qhexrt
        pluginClass: QhexrtPlugin
      ios:
        pluginClass: QhexrtPlugin
