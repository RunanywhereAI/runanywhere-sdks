name: runanywhere_qhexrt
description: On-device NPU acceleration backend for RunAnywhere — LLM/VLM/STT/TTS on Qualcomm Snapdragon Hexagon (V75/V79/V81), Android arm64.
version: 0.20.10
homepage: https://runanywhere.ai
repository: https://github.com/RunanywhereAI/runanywhere-sdks
issue_tracker: https://github.com/RunanywhereAI/runanywhere-sdks/issues
topics:
  - ai
  - llm
  - npu
  - qualcomm
  - on-device

environment:
  sdk: '>=3.12.0 <4.0.0'
  flutter: '>=3.44.0'

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  runanywhere: ^0.20.10
  # Keep this bounded for pub.dev publish validation, matching the core
  # package's major-version range.
  ffi: '>=2.2.0 <3.0.0'

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: any

flutter:
  uses-material-design: true
  plugin:
    platforms:
      android:
        package: ai.runanywhere.sdk.qhexrt
        pluginClass: QhexrtPlugin
