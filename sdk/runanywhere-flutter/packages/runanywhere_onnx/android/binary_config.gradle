// =============================================================================
// BINARY CONFIGURATION FOR RUNANYWHERE FLUTTER SDK - ANDROID (ONNX Package)
// =============================================================================
// This file controls whether to use local or remote native libraries (.so files).
// Similar to Swift Package.swift's testLocal flag.
//
// Set to `true` to use local binaries from android/src/main/jniLibs/
// Set to `false` to download binaries from GitHub releases (production mode)
// =============================================================================

ext {
    // Canonical name (matches Swift/Kotlin/RN and the runanywhere core plugin).
    // Defaults to true so monorepo developers building via
    // `scripts/build-core-android.sh` consume local .so files. Overridable via
    // the root Gradle property `runanywhere.useLocalNatives`.
    def localNativesProp = project.findProperty("runanywhere.useLocalNatives")
    useLocalNatives = localNativesProp != null ? localNativesProp.toString().toBoolean() : true
    testLocal = useLocalNatives  // legacy alias

    // =============================================================================
    // Version Configuration (MUST match Swift Package.swift and Kotlin build.gradle.kts)
    // =============================================================================
    coreVersion = "0.1.6"

    // =============================================================================
    // Remote binary URLs
    // RABackendONNX from runanywhere-sdks
    // =============================================================================
    binariesGitHubOrg = "RunanywhereAI"
    binariesRepo = "runanywhere-sdks"
    binariesBaseUrl = "https://github.com/${binariesGitHubOrg}/${binariesRepo}/releases/download"

    // Android native libraries package
    onnxAndroidUrl = "${binariesBaseUrl}/commons-v${coreVersion}/RABackendONNX-android-v${coreVersion}.zip"

    // Helper method to check if we should download
    shouldDownloadAndroidLibs = { ->
        return !testLocal
    }

    // Helper method to check if local libs exist.
    // The engines CMake may emit either `librac_backend_onnx.so` (always)
    // and/or `librac_backend_onnx_jni.so` (Android JNI entry point, emitted
    // only when RAC_BUILD_SHARED=ON). Treat either as a valid indicator so we
    // don't fail the build when the JNI suffix isn't generated on every preset.
    checkLocalLibsExist = { ->
        def jniLibsDir = project.file('src/main/jniLibs')
        def arm64Dir = new File(jniLibsDir, 'arm64-v8a')

        if (!arm64Dir.exists() || !arm64Dir.isDirectory()) {
            return false
        }

        def backendLib = new File(arm64Dir, 'librac_backend_onnx.so')
        def backendJniLib = new File(arm64Dir, 'librac_backend_onnx_jni.so')
        return backendLib.exists() || backendJniLib.exists()
    }
}
