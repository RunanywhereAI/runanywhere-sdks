# ffigen scaffold for the runanywhere Flutter SDK.
#
# Status: NOT YET WIRED IN.
#
# This file is a starting point for migrating
# `lib/native/types/*.dart` away from hand-maintained typedefs and toward
# package:ffigen-generated bindings against the commons C ABI.
#
# Until ffigen is wired into the build:
#   * The hand-written typedefs in `lib/native/types/basic_types.dart`,
#     `lib/native/types/core_function_types.dart`, etc. are still the
#     source of truth at runtime.
#   * Every commons-side enum / error-code / struct change MUST be
#     reflected manually in those files (audited 2026-05-04).
#
# To wire ffigen in:
#   1. Add `ffigen: ^17.0.0` (or later) under dev_dependencies in pubspec.yaml.
#   2. Run `dart pub get` in this package.
#   3. Run `dart run ffigen --config ffigen.yaml` to regenerate
#      `lib/native/generated/rac_bindings.dart`.
#   4. Migrate `lib/native/types/*.dart` consumers to the generated
#      bindings, then delete the hand-written typedef files (FLT-08).
#
# Expected commons header layout (see CLAUDE.md):
#   ../../../../sdk/runanywhere-commons/include/rac/core/rac_types.h
#   ../../../../sdk/runanywhere-commons/include/rac/core/rac_error.h
#   ...
#
# Adjust paths if this package is built outside the monorepo.

name: RacBindings
description: |
  Generated FFI bindings for runanywhere-commons (rac_*) C ABI.
  Do not edit by hand — regenerate via:
    dart run ffigen --config ffigen.yaml

output: 'lib/native/generated/rac_bindings.dart'

# Headers to parse. Start with the foundational types and error codes; the
# full migration should extend this list to cover every public rac_* API
# surface consumed by the Flutter SDK.
headers:
  entry-points:
    - '../../../runanywhere-commons/include/rac/core/rac_types.h'
    - '../../../runanywhere-commons/include/rac/core/rac_error.h'
    - '../../../runanywhere-commons/include/rac/features/stt/rac_stt_types.h'
    - '../../../runanywhere-commons/include/rac/features/tts/rac_tts_types.h'
    - '../../../runanywhere-commons/include/rac/features/vad/rac_vad_types.h'
    - '../../../runanywhere-commons/include/rac/features/llm/rac_llm_types.h'
    - '../../../runanywhere-commons/include/rac/features/vlm/rac_vlm_types.h'
  include-directives:
    - '**rac_types.h'
    - '**rac_error.h'
    - '**rac_stt_types.h'
    - '**rac_tts_types.h'
    - '**rac_vad_types.h'
    - '**rac_llm_types.h'
    - '**rac_vlm_types.h'

# Symbol filters: only emit `rac_*` / `RAC_*` to keep the generated
# surface tight. Adjust as additional headers are added.
functions:
  include:
    - 'rac_.*'
structs:
  include:
    - 'rac_.*'
unions:
  include:
    - 'rac_.*'
enums:
  include:
    - 'rac_.*'
unnamed-enums:
  include:
    - 'RAC_.*'
macros:
  include:
    - 'RAC_.*'
typedefs:
  include:
    - 'rac_.*'

# Use Pascal-case wrapper class so consumers can write
# `final bindings = RacBindings(dynamicLibrary)`.
preamble: |
  // ignore_for_file: type=lint, non_constant_identifier_names, constant_identifier_names

# Keep extra header-search paths consistent with how runanywhere-commons
# is built. Update if local include directories change.
compiler-opts:
  - '-I../../../runanywhere-commons/include'
  - '-DRAC_EXPORT='
