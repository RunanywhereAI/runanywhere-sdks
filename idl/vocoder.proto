// RunAnywhere IDL - generic mel-spectrogram vocoder types.

syntax = "proto3";

package runanywhere.v1;

option cc_enable_arenas          = true;
option java_multiple_files       = true;
option java_package              = "ai.runanywhere.proto.v1";
option java_outer_classname      = "VocoderProto";
option objc_class_prefix         = "RAV1";
option csharp_namespace          = "Runanywhere.V1";
option swift_prefix              = "RA";
option go_package                = "github.com/runanywhere/runanywhere-sdks/idl/v1;runanywherev1";

message VocoderRequest {
    // Contiguous IEEE-754 float32 little-endian data in [B, M, T] order.
    bytes mel_spectrogram_f32_le = 1;
    uint32 batch_size = 2;
    uint32 mel_bin_count = 3;
    uint32 frame_count = 4;
}

message VocoderResult {
    // Contiguous IEEE-754 float32 little-endian data in [B, C, S] order.
    bytes samples_f32_le = 1;
    uint32 batch_size = 2;
    uint32 channel_count = 3;
    uint32 sample_count = 4;
    uint32 sample_rate_hz = 5;
    uint32 hop_length = 6;
    int64 processing_time_ms = 7;
    string model_id = 8;
}

service Vocoder {
    rpc Vocode(VocoderRequest) returns (VocoderResult);
}
