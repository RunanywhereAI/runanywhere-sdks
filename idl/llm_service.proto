// RunAnywhere IDL — LLM token streaming service.
//
// GAP 09 Phase 12. Server-streaming rpc returning per-token deltas during
// LLM generation. Replaces the 5 hand-written token-stream implementations
// (Swift AsyncThrowingStream, Kotlin callbackFlow, Dart StreamController,
// RN Nitro callback, Web tokenQueue) with one schema + 5 thin adapters.

syntax = "proto3";

package runanywhere.v1;

option cc_enable_arenas      = true;
option java_multiple_files   = true;
option java_package          = "ai.runanywhere.proto.v1";
option java_outer_classname  = "LLMServiceProto";
option objc_class_prefix     = "RAV1";
option csharp_namespace      = "Runanywhere.V1";
option swift_prefix          = "RA";
option go_package            = "github.com/runanywhere/runanywhere-sdks/idl/v1;runanywherev1";

message LLMGenerateRequest {
    string prompt           = 1;
    int32  max_tokens       = 2;
    float  temperature      = 3;
    float  top_p            = 4;
    int32  top_k            = 5;
    string system_prompt    = 6;
    bool   emit_thoughts    = 7;   // chain-of-thought tokens emit as TokenKind.THOUGHT

    // Additional LLMGenerationOptions fields kept inline to avoid a codegen
    // package cycle between service stubs and option messages.
    float  repetition_penalty = 8;
    repeated string stop_sequences = 9;
    bool   streaming_enabled = 10;
    string preferred_framework = 11;
    string json_schema = 12;
    string execution_target = 13;
    string request_id = 14;
    string model_id = 15;
    string conversation_id = 16;
    int64  seed = 17;
    float  frequency_penalty = 18;
    float  presence_penalty = 19;
    float  min_p = 20;
    string grammar = 21;
    string response_format = 22;
    bool   echo_prompt = 23;
    int32  n_threads = 24;
    map<string, string> metadata = 25;
}

// Aggregate result carried on the terminal LLMStreamEvent. This intentionally
// duplicates the scalar result fields instead of importing llm_options.proto:
// Square Wire treats files with/without go_package as different Kotlin
// packages, and that import creates a package cycle through sdk_events.
message LLMStreamFinalResult {
    string text = 1;
    optional string thinking_content = 2;
    int32 prompt_tokens = 3;
    int32 completion_tokens = 4;
    int32 total_tokens = 5;
    int64 total_time_ms = 6;
    int64 time_to_first_token_ms = 7;
    float tokens_per_second = 8;
    string finish_reason = 9;
    int32 error_code = 10;
    string error_message = 11;
    int64 prompt_eval_time_ms = 12;
    int64 decode_time_ms = 13;
}

enum LLMStreamEventKind {
    LLM_STREAM_EVENT_KIND_UNSPECIFIED = 0;
    LLM_STREAM_EVENT_KIND_STARTED = 1;
    LLM_STREAM_EVENT_KIND_TOKEN = 2;
    LLM_STREAM_EVENT_KIND_THINKING = 3;
    LLM_STREAM_EVENT_KIND_TOOL_CALL = 4;
    LLM_STREAM_EVENT_KIND_PROGRESS = 5;
    LLM_STREAM_EVENT_KIND_COMPLETED = 6;
    LLM_STREAM_EVENT_KIND_ERROR = 7;
}

// v2 close-out Phase G-2: unified per-token streaming event. Replaces
// LLMToken (deleted) and the per-SDK hand-rolled AsyncThrowingStream /
// callbackFlow / StreamController / tokenQueue. One serialized event
// per generated token. Mirrors VoiceEvent's seq + timestamp_us pattern
// from voice_events.proto so frontends can reuse gap-detection logic.
message LLMStreamEvent {
    // Monotonic per-process sequence number. Useful for frontends that
    // need to detect gaps or out-of-order delivery.
    uint64 seq             = 1;

    // Wall-clock timestamp captured at the C++ edge, in microseconds
    // since Unix epoch. Frontends may re-timestamp for UI display.
    int64  timestamp_us    = 2;

    // Generated token text. Empty on terminal events where only
    // finish_reason or error_message is populated.
    string token           = 3;

    // True on the last event of a generation.
    bool   is_final        = 4;

    // Token semantic category (answer / thought / tool-call).
    LLMTokenKind kind      = 5;

    // Backend-provided token id when the engine exposes it; 0 = unset
    // (proto3 scalar default).
    uint32 token_id        = 6;

    // Per-token log-probability when supported; 0.0 = unset.
    float  logprob         = 7;

    // Reason the stream stopped: "stop", "length", "cancelled", "error",
    // "" = unset (proto3 scalar default). Only populated when is_final.
    string finish_reason   = 8;

    // Error message on failure events (kind may be unset, is_final true).
    // Empty on success.
    string error_message   = 9;

    // Final aggregate result. Only populated on terminal events
    // (is_final=true) when the backend can report result metrics.
    optional LLMStreamFinalResult result = 10;

    // Numeric backend status code when the terminal event represents a
    // failure. 0 = unset/success.
    int32 error_code = 11;

    // Event classification distinct from token semantic kind.
    LLMStreamEventKind event_kind = 12;

    // Request/session correlation fields.
    string request_id = 13;
    string conversation_id = 14;

    // Running counters for progress UIs.
    int32 prompt_tokens_processed = 15;
    int32 completion_tokens_generated = 16;
    int64 elapsed_ms = 17;
}

enum LLMTokenKind {
    LLM_TOKEN_KIND_UNSPECIFIED = 0;
    LLM_TOKEN_KIND_ANSWER      = 1;
    LLM_TOKEN_KIND_THOUGHT     = 2;
    LLM_TOKEN_KIND_TOOL_CALL   = 3;
}

service LLM {
    // Server-streaming: emits one LLMStreamEvent per generated token
    // until is_final=true. Cancellation aborts the underlying generation
    // via the existing rac_llm_cancel() C ABI.
    rpc Generate(LLMGenerateRequest) returns (stream LLMStreamEvent);
}
