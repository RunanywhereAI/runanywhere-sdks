syntax = "proto3";
package runanywhere.v1;

option cc_enable_arenas      = true;
option java_multiple_files   = true;
option java_package          = "ai.runanywhere.proto.v1";
option java_outer_classname  = "HardwareProfileProto";
option objc_class_prefix     = "RAV1";
option swift_prefix          = "RA";

message HardwareProfile {
  string chip = 1;
  bool has_neural_engine = 2;
  string acceleration_mode = 3; // "ane", "gpu", "cpu"
  uint64 total_memory_bytes = 4;
  uint32 core_count = 5;
  uint32 performance_cores = 6;
  uint32 efficiency_cores = 7;
  string architecture = 8; // "arm64", "x86_64"
  string platform = 9; // "ios", "android", "web", "macos", "linux", "windows"
}

enum AcceleratorPreference {
  ACCELERATOR_PREFERENCE_AUTO = 0;
  ACCELERATOR_PREFERENCE_ANE = 1;
  ACCELERATOR_PREFERENCE_GPU = 2;
  ACCELERATOR_PREFERENCE_CPU = 3;
}

message AcceleratorInfo {
  string name = 1;
  AcceleratorPreference type = 2;
  bool available = 3;
}

message HardwareProfileResult {
  HardwareProfile profile = 1;
  repeated AcceleratorInfo accelerators = 2;
}

// Empty request for the cached hardware profile. The native probe is owned by
// platform adapters; this request carries no portable parameters today.
message HardwareProfileRequest {
}

// Empty request for the accelerator list. Mirrors HardwareProfileRequest:
// platform probes own all OS-level acceleration discovery.
message HardwareAcceleratorsRequest {
}

// Result-shaped response for SetAcceleratorPreference so the service contract
// stays consistent (every rpc returns a non-empty message).
message HardwareAcceleratorPreferenceRequest {
  AcceleratorPreference preference = 1;
}

message HardwareAcceleratorPreferenceResult {
  bool   success       = 1;
  string error_message = 2;
}

// Logical hardware service contract. Mirrors the C ABI in
// sdk/runanywhere-commons/include/rac/router/rac_hardware_abi.h:
//   - rac_hardware_profile_get → GetProfile
//   - rac_hardware_get_accelerators → GetAccelerators
//   - rac_hardware_set_accelerator_preference → SetAcceleratorPreference
//
// Native device probes (chip detection, neural engine queries, GPU
// discovery, memory/cores) remain platform-adapter owned. C++ caches and
// serves the normalized HardwareProfile/AcceleratorInfo messages.
service Hardware {
  rpc GetProfile(HardwareProfileRequest) returns (HardwareProfileResult);
  rpc GetAccelerators(HardwareAcceleratorsRequest) returns (HardwareProfileResult);
  rpc SetAcceleratorPreference(HardwareAcceleratorPreferenceRequest)
      returns (HardwareAcceleratorPreferenceResult);
}
