// RunAnywhere v2 IDL — streaming events emitted by the VoiceAgent solution.
//
// Every frontend binds to this schema via its native proto3 codegen
// (swift-protobuf, Wire, protobuf.dart, ts-proto). There is NO hand-written
// event type in any frontend adapter.

syntax = "proto3";

package runanywhere.v1;

option cc_enable_arenas          = true;
option java_multiple_files       = true;
option java_package              = "ai.runanywhere.proto.v1";
option java_outer_classname      = "VoiceEventsProto";
option objc_class_prefix         = "RAV1";
option csharp_namespace          = "Runanywhere.V1";
option swift_prefix              = "RA";

// ---------------------------------------------------------------------------
// Sum type emitted on the output edge of the VoiceAgent pipeline.
// ---------------------------------------------------------------------------
message VoiceEvent {
    // Monotonic pipeline-local sequence number. Useful for frontends that
    // need to detect gaps after reconnection or out-of-order delivery.
    uint64 seq            = 1;

    // Wall-clock timestamp captured at the C++ edge, in microseconds since
    // Unix epoch. Frontends may re-timestamp for UI display.
    int64  timestamp_us   = 2;

    // Exactly one of the following is populated on every event.
    oneof payload {
        UserSaidEvent     user_said        = 10;
        AssistantTokenEvent assistant_token = 11;
        AudioFrameEvent   audio            = 12;
        VADEvent          vad              = 13;
        InterruptedEvent  interrupted      = 14;
        StateChangeEvent  state            = 15;
        ErrorEvent        error            = 16;
        MetricsEvent      metrics          = 17;

        // v3.2: Voice agent lifecycle events. Mirror Swift VoiceSessionError /
        // VoiceAgentComponentStates and the AsyncSequence-style lifecycle
        // signals consumed by the cross-platform VoiceAgent extensions
        // (Swift VoiceAgentTypes.swift, Kotlin VoiceAgentTypes.kt, RN
        // VoiceAgentTypes.ts, Web VoiceAgentCTypes.ts, Flutter
        // voice_agent_types.dart).
        VoiceAgentComponentStates component_state_changed = 18;
        VoiceSessionError         session_error           = 19;
        SessionStartedEvent       session_started         = 20;
        SessionStoppedEvent       session_stopped         = 21;
        AgentResponseStartedEvent agent_response_started  = 22;
        AgentResponseCompletedEvent agent_response_completed = 23;
    }
}

// User speech finalized by STT (is_final=false → partial hypothesis).
message UserSaidEvent {
    string text           = 1;
    bool   is_final       = 2;
    float  confidence     = 3;    // 0.0..1.0, engine-dependent
    int64  audio_start_us = 4;
    int64  audio_end_us   = 5;
}

// Single token decoded by the LLM. is_final=true on the last token of a
// response (end-of-stream marker).
message AssistantTokenEvent {
    string text           = 1;
    bool   is_final       = 2;
    TokenKind kind        = 3;
}

enum TokenKind {
    TOKEN_KIND_UNSPECIFIED = 0;
    TOKEN_KIND_ANSWER      = 1;   // Regular content token
    TOKEN_KIND_THOUGHT     = 2;   // Chain-of-thought token (qwen3, deepseek-r1)
    TOKEN_KIND_TOOL_CALL   = 3;   // Parsed tool-call directive
}

// A chunk of synthesized PCM audio, ready for the sink. The frontend is
// expected to copy the bytes out; the C ABI does NOT retain ownership.
message AudioFrameEvent {
    bytes pcm             = 1;    // f32 little-endian interleaved
    int32 sample_rate_hz  = 2;    // usually 24000 for Kokoro, 22050 for Piper
    int32 channels        = 3;    // 1 for mono
    AudioEncoding encoding = 4;
}

enum AudioEncoding {
    AUDIO_ENCODING_UNSPECIFIED = 0;
    AUDIO_ENCODING_PCM_F32_LE  = 1;
    AUDIO_ENCODING_PCM_S16_LE  = 2;
}

// Voice Activity Detection output. Frontends usually do not need this —
// exposed for debugging and custom UIs (waveform highlighting, etc.).
message VADEvent {
    VADEventType type     = 1;
    int64  frame_offset_us = 2;
}

enum VADEventType {
    VAD_EVENT_UNSPECIFIED        = 0;
    VAD_EVENT_VOICE_START        = 1;
    VAD_EVENT_VOICE_END_OF_UTTERANCE = 2;
    VAD_EVENT_BARGE_IN           = 3;
    VAD_EVENT_SILENCE            = 4;
}

// Assistant playback was interrupted by a barge-in. The reason distinguishes
// user barge-in from app-initiated cancel.
message InterruptedEvent {
    InterruptReason reason = 1;
    string          detail = 2;
}

enum InterruptReason {
    INTERRUPT_REASON_UNSPECIFIED = 0;
    INTERRUPT_REASON_USER_BARGE_IN = 1;
    INTERRUPT_REASON_APP_STOP    = 2;
    INTERRUPT_REASON_AUDIO_ROUTE_CHANGE = 3;
    INTERRUPT_REASON_TIMEOUT     = 4;
}

// Pipeline lifecycle state. Ordered — callers can compare numerically.
message StateChangeEvent {
    PipelineState previous = 1;
    PipelineState current  = 2;
}

enum PipelineState {
    PIPELINE_STATE_UNSPECIFIED = 0;
    PIPELINE_STATE_IDLE      = 1;
    PIPELINE_STATE_LISTENING = 2;
    PIPELINE_STATE_THINKING  = 3;
    PIPELINE_STATE_SPEAKING  = 4;
    PIPELINE_STATE_STOPPED   = 5;
}

// Terminal or recoverable error in the pipeline. Frontends map these to
// their native error types.
message ErrorEvent {
    int32  code           = 1;   // See ra_status_t in core/abi/ra_primitives.h
    string message        = 2;
    string component      = 3;   // "llm", "stt", "tts", "vad", "pipeline", ...
    bool   is_recoverable = 4;
}

// Per-primitive latency breakdown. Emitted at barge-in and at pipeline stop.
message MetricsEvent {
    double stt_final_ms       = 1;
    double llm_first_token_ms = 2;
    double tts_first_audio_ms = 3;
    double end_to_end_ms      = 4;
    int64  tokens_generated   = 5;
    int64  audio_samples_played = 6;

    // True when `end_to_end_ms` exceeded the `PipelineOptions.latency_budget_ms`
    // configured for this run. Frontends can surface this to the UI for SLO
    // dashboards without re-computing the threshold themselves.
    bool   is_over_budget     = 7;

    // v3.1: monotonic producer-side timestamp in nanoseconds. Set by the
    // producer (C++ dispatcher) at event-emit time; read by consumers
    // (5-SDK perf_bench + p50 benchmark CI) to compute event-to-frontend
    // latency without relying on wall-clock sync. Encoded as int64 so
    // std::chrono::steady_clock::now().time_since_epoch() values fit
    // directly (2^63 ns ≈ 292 years of runtime headroom).
    int64  created_at_ns      = 8;
}

// ---------------------------------------------------------------------------
// v3.2: VoiceAgent component-load lifecycle.
//
// Mirrors the per-SDK ComponentLoadState (Swift / Kotlin / RN / Web / Flutter)
// describing whether each sub-component (STT, LLM, TTS, VAD) of the voice
// agent has been loaded yet. Emitted on the `VoiceEvent.component_state_changed`
// oneof arm whenever any component transitions.
// ---------------------------------------------------------------------------

// Loading state of a single voice-agent component (STT, LLM, TTS, VAD).
// UNSPECIFIED preserves proto3 zero-value semantics — frontends MUST treat it
// the same as NOT_LOADED for forward-compatibility.
enum ComponentLoadState {
    COMPONENT_LOAD_STATE_UNSPECIFIED = 0;
    COMPONENT_LOAD_STATE_NOT_LOADED  = 1;
    COMPONENT_LOAD_STATE_LOADING     = 2;
    COMPONENT_LOAD_STATE_LOADED      = 3;
    COMPONENT_LOAD_STATE_ERROR       = 4;
}

// Aggregate load state across all four voice-agent components. Mirrors Swift
// `VoiceAgentComponentStates`, Kotlin `VoiceAgentComponentStates`, RN
// `VoiceAgentComponentStates`, Web `VoiceAgentComponentStates`, and Flutter
// `VoiceAgentComponentStates`.
message VoiceAgentComponentStates {
    ComponentLoadState stt_state = 1;
    ComponentLoadState llm_state = 2;
    ComponentLoadState tts_state = 3;
    ComponentLoadState vad_state = 4;

    // Computed: true when stt_state, llm_state, tts_state, vad_state are all
    // COMPONENT_LOAD_STATE_LOADED. Producer sets this; consumers must NOT
    // recompute.
    bool ready       = 5;

    // Computed: true when any of the four states is COMPONENT_LOAD_STATE_LOADING.
    bool any_loading = 6;
}

// ---------------------------------------------------------------------------
// v3.2: Voice session error taxonomy.
//
// Mirrors Swift `VoiceSessionError`, Kotlin `VoiceSessionError`. The
// `failed_component` field is populated only for COMPONENT_FAILURE — naming
// the sub-component that produced the underlying error ("stt", "llm",
// "tts", "vad", "wakeword").
// ---------------------------------------------------------------------------

enum VoiceSessionErrorCode {
    VOICE_SESSION_ERROR_CODE_UNSPECIFIED            = 0;
    VOICE_SESSION_ERROR_CODE_MICROPHONE_PERMISSION_DENIED = 1;
    VOICE_SESSION_ERROR_CODE_NOT_READY              = 2;
    VOICE_SESSION_ERROR_CODE_ALREADY_RUNNING        = 3;
    VOICE_SESSION_ERROR_CODE_COMPONENT_FAILURE      = 4;
}

message VoiceSessionError {
    VoiceSessionErrorCode code            = 1;
    string                message         = 2;
    optional string       failed_component = 3;
}

// ---------------------------------------------------------------------------
// v3.2: Voice session lifecycle markers.
//
// Mirror the AsyncSequence / Flow lifecycle signals emitted by the per-SDK
// VoiceAgent extensions. Carry no payload of their own — the surrounding
// VoiceEvent already provides `seq`, `timestamp_us`, and (via MetricsEvent)
// the latency breakdown.
// ---------------------------------------------------------------------------

message SessionStartedEvent {}

message SessionStoppedEvent {}

message AgentResponseStartedEvent {}

message AgentResponseCompletedEvent {}
